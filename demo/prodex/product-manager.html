// EPIC / FEATURE / APP tables (drag + order + unarchive)
// ══════════════════════════════════════════════════════════
function renderEpics() {
  setHead('Epics','Group tickets into epics',`<button class="btn btn-primary" onclick="openEM()">+ New Epic</button>`);
  const aa=apps.filter(a=>!a.archived), af=feats.filter(f=>!f.archived);
  const fbarHtml=filterBar('epics',[{label:'App',key:'appIds',items:aa.map(a=>({id:a.id,label:a.title}))},{label:'Feature',key:'featIds',items:af.map(f=>({id:f.id,label:f.title}))}]);
  const rows=sortByOrder(epics); const filtered=applyFilters(rows,'epics');
  const act=filtered.filter(e=>!e.archived), arch=filtered.filter(e=>e.archived);
  document.getElementById('mc').innerHTML=fbarHtml+tabsHtml(act.length,arch.length)+`<div id="tp-active">${eTable(act,0)}</div><div id="tp-archived" style="display:none">${eTable(arch,1)}</div>`;
}
function eTable(rows, isA) {
  if (!rows.length) return `<div class="empty"><div class="ico">◻</div><p>No epics yet.</p></div>`;
  const ns=isA?'earch':'eact';
  return `<div class="table-wrap"><table><thead><tr><th style="width:26px"></th><th style="width:26px;text-align:right">#</th><th>ID</th><th>Title</th><th>Priority</th><th>Feature</th><th>Tickets</th><th>Owner</th><th>Updated</th><th></th></tr></thead>
  <tbody id="tbody-${ns}">${rows.map((e,idx)=>{
    const bc=e.featId?(featBreadcrumb(e.featId)||'—'):'—', tc=tix.filter(t=>t.epicId===e.id&&!t.archived).length;
    return `<tr draggable="true" data-id="${e.id}" data-store="epics" class="${isA?'archived-row':''}" onclick="openED('${e.id}')" ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="drop(event,'epics')" ondragleave="dragLeave(event)" ondragend="dragEnd(event)">
      <td onclick="event.stopPropagation()"><span class="drag-handle">⠿</span></td>
      <td style="text-align:right"><span class="order-num">${e.sortOrder??idx+1}</span></td>
      <td><span class="id-chip">${e.id}</span></td><td style="font-weight:500">${e.title}</td>
      <td>${e.priority?ptag(e.priority):'—'}</td>
      <td style="font-size:12px;color:var(--text2);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${bc}</td>
      <td><span class="tag tag-sprint">${tc}</span></td>
      <td>${e.ownerId?userAvatar(e.ownerId):'—'}</td>
      <td style="font-size:11px;color:var(--text3);font-family:var(--mono)">${fd(e.updatedAt||e.createdAt)}</td>
      <td><div class="row-actions" onclick="event.stopPropagation()">
        ${!isA?`<button class="btn btn-ghost btn-sm" onclick="openEM('${e.id}')">Edit</button>`:''}
        ${!isA?`<button class="btn btn-ghost btn-sm" onclick="archE('${e.id}')">Archive</button>`:
               `<button class="btn btn-ghost btn-sm" onclick="archE('${e.id}',true)">↩ Unarchive</button>`}
        <button class="btn btn-danger btn-sm" onclick="delE('${e.id}')">Del</button>
      </div></td></tr>`;
  }).join('')}</tbody></table></div>`;
}
function renderFeats() {
  setHead('Features','Group epics into features',`<button class="btn btn-primary" onclick="openFM()">+ New Feature</button>`);
  const aa=apps.filter(a=>!a.archived);
  const fbarHtml=filterBar('feats',[{label:'App',key:'appIds',items:aa.map(a=>({id:a.id,label:a.title}))}]);
  const rows=sortByOrder(feats); const filtered=applyFilters(rows,'feats');
  const act=filtered.filter(f=>!f.archived), arch=filtered.filter(f=>f.archived);
  document.getElementById('mc').innerHTML=fbarHtml+tabsHtml(act.length,arch.length)+`<div id="tp-active">${fTable(act,0)}</div><div id="tp-archived" style="display:none">${fTable(arch,1)}</div>`;
}
function fTable(rows, isA) {
  if (!rows.length) return `<div class="empty"><div class="ico">◻</div><p>No features yet.</p></div>`;
  const ns=isA?'farch':'fact';
  return `<div class="table-wrap"><table><thead><tr><th style="width:26px"></th><th style="width:26px;text-align:right">#</th><th>ID</th><th>Title</th><th>Priority</th><th>App</th><th>Epics</th><th>Updated</th><th></th></tr></thead>
  <tbody id="tbody-${ns}">${rows.map((f,idx)=>{
    const at=f.appId?(apps.find(a=>a.id===f.appId)?.title||'—'):'—', ec=epics.filter(e=>e.featId===f.id&&!e.archived).length;
    return `<tr draggable="true" data-id="${f.id}" data-store="feats" class="${isA?'archived-row':''}" onclick="openFD('${f.id}')" ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="drop(event,'feats')" ondragleave="dragLeave(event)" ondragend="dragEnd(event)">
      <td onclick="event.stopPropagation()"><span class="drag-handle">⠿</span></td>
      <td style="text-align:right"><span class="order-num">${f.sortOrder??idx+1}</span></td>
      <td><span class="id-chip">${f.id}</span></td><td style="font-weight:500">${f.title}</td>
      <td>${f.priority?ptag(f.priority):'—'}</td>
      <td style="font-size:12px;color:var(--text2)">${at}</td>
      <td><span class="tag tag-dev">${ec}</span></td>
      <td style="font-size:11px;color:var(--text3);font-family:var(--mono)">${fd(f.updatedAt||f.createdAt)}</td>
      <td><div class="row-actions" onclick="event.stopPropagation()">
        ${!isA?`<button class="btn btn-ghost btn-sm" onclick="openFM('${f.id}')">Edit</button>`:''}
        ${!isA?`<button class="btn btn-ghost btn-sm" onclick="archF('${f.id}')">Archive</button>`:
               `<button class="btn btn-ghost btn-sm" onclick="archF('${f.id}',true)">↩ Unarchive</button>`}
        <button class="btn btn-danger btn-sm" onclick="delF('${f.id}')">Del</button>
      </div></td></tr>`;
  }).join('')}</tbody></table></div>`;
}
function renderApps() {
  setHead('Apps','Top-level product applications',`<button class="btn btn-primary" onclick="openAM()">+ New App</button>`);
  const sorted=sortByOrder(apps); const act=sorted.filter(a=>!a.archived), arch=sorted.filter(a=>a.archived);
  document.getElementById('mc').innerHTML=tabsHtml(act.length,arch.length)+`<div id="tp-active">${aTable(act,0)}</div><div id="tp-archived" style="display:none">${aTable(arch,1)}</div>`;
}
function aTable(rows, isA) {
  if (!rows.length) return `<div class="empty"><div class="ico">◻</div><p>No apps yet.</p></div>`;
  const ns=isA?'aarch':'aact';
  return `<div class="table-wrap"><table><thead><tr><th style="width:26px"></th><th style="width:26px;text-align:right">#</th><th>ID</th><th>Title</th><th>Priority</th><th>Description</th><th>Features</th><th>Updated</th><th></th></tr></thead>
  <tbody id="tbody-${ns}">${rows.map((a,idx)=>{
    const fc=feats.filter(f=>f.appId===a.id&&!f.archived).length;
    return `<tr draggable="true" data-id="${a.id}" data-store="apps" class="${isA?'archived-row':''}" onclick="openAD('${a.id}')" ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="drop(event,'apps')" ondragleave="dragLeave(event)" ondragend="dragEnd(event)">
      <td onclick="event.stopPropagation()"><span class="drag-handle">⠿</span></td>
      <td style="text-align:right"><span class="order-num">${a.sortOrder??idx+1}</span></td>
      <td><span class="id-chip">${a.id}</span></td><td style="font-weight:500">${a.title}</td>
      <td>${a.priority?ptag(a.priority):'—'}</td>
      <td style="font-size:12px;color:var(--text2);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.description?.replace(/<[^>]+>/g,'')||'—'}</td>
      <td><span class="tag tag-blue">${fc}</span></td>
      <td style="font-size:11px;color:var(--text3);font-family:var(--mono)">${fd(a.updatedAt||a.createdAt)}</td>
      <td><div class="row-actions" onclick="event.stopPropagation()">
        ${!isA?`<button class="btn btn-ghost btn-sm" onclick="openAM('${a.id}')">Edit</button>`:''}
        ${!isA?`<button class="btn btn-ghost btn-sm" onclick="archA('${a.id}')">Archive</button>`:
               `<button class="btn btn-ghost btn-sm" onclick="archA('${a.id}',true)">↩ Unarchive</button>`}
        <button class="btn btn-danger btn-sm" onclick="delA('${a.id}')">Del</button>
      </div></td></tr>`;
  }).join('')}</tbody></table></div>`;
}

// ══════════════════════════════════════════════════════════
// USERS
// ══════════════════════════════════════════════════════════
function renderUsers() {
  setHead('Users','Team members & collaborators',`<button class="btn btn-primary" onclick="openUM()">+ Add User</button>`);
  if (!users.length) { document.getElementById('mc').innerHTML=`<div class="empty"><div class="ico">◎</div><p>No users yet.</p></div>`; return; }
  document.getElementById('mc').innerHTML=`
    <div class="users-grid">${users.map(u=>{
      const assigned=tix.filter(t=>t.assignedTo===u.id&&!t.archived).length;
      const created=tix.filter(t=>t.createdBy===u.id).length;
      const inProd=tix.filter(t=>t.assignedTo===u.id&&t.status==='production'&&!t.archived).length;
      return `<div class="user-card" onclick="openUD('${u.id}')">
        <span class="avatar avatar-lg" style="background:${u.color}">${u.initials}</span>
        <div class="user-info">
          <div class="user-name">${u.name}${u.isAdmin?` <span class="sb-admin-badge">ADMIN</span>`:''}</div>
          <div class="user-role">${roleLabel(u.roleId)}</div>
          <div class="user-stats">
            <span class="user-stat-item">📋 ${assigned}</span>
            <span class="user-stat-item">✍ ${created}</span>
            <span class="user-stat-item">✅ ${inProd}</span>
          </div>
        </div>
        <div class="row-actions">
          <button class="btn btn-ghost btn-icon btn-sm" onclick="event.stopPropagation();openUM('${u.id}')">✎</button>
          <button class="btn btn-danger btn-icon btn-sm" onclick="event.stopPropagation();delU('${u.id}')">✕</button>
        </div>
      </div>`;
    }).join('')}</div>
    <div class="section-label">Tickets by User</div>
    <div class="table-wrap"><table>
      <thead><tr><th>User</th><th>Role</th><th>Admin</th><th>Backlog</th><th>Dev</th><th>Test</th><th>Prod</th><th>Total</th></tr></thead>
      <tbody>${users.map(u=>{
        const ut=tix.filter(t=>t.assignedTo===u.id&&!t.archived);
        const sc={}; ST.forEach(s=>sc[s.v]=ut.filter(t=>t.status===s.v).length);
        return `<tr onclick="openUD('${u.id}')">
          <td><div style="display:flex;align-items:center;gap:8px"><span class="avatar" style="background:${u.color}">${u.initials}</span><span style="font-weight:500">${u.name}</span></div></td>
          <td style="color:var(--text2);font-size:12px">${roleLabel(u.roleId)}</td>
          <td>${u.isAdmin?'<span class="sb-admin-badge">ADMIN</span>':'—'}</td>
          <td><span class="tag tag-backlog">${sc.backlog}</span></td>
          <td><span class="tag tag-dev">${sc.dev}</span></td>
          <td><span class="tag tag-test">${sc.test}</span></td>
          <td><span class="tag tag-production">${sc.production}</span></td>
          <td style="font-family:var(--mono);font-size:12px;font-weight:700">${ut.length}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;
}

// ══════════════════════════════════════════════════════════
// REPORTS (with project/feature filter)
// ══════════════════════════════════════════════════════════
function renderReports() {
  const rSaved=FP.get('reports');
  const aa=apps.filter(a=>!a.archived), af=feats.filter(f=>!f.archived);
  const fbarHtml=filterBar('reports',[
    {label:'Project',key:'appIds',items:aa.map(a=>({id:a.id,label:a.title}))},
    {label:'Feature',key:'featIds',items:af.map(f=>({id:f.id,label:f.title}))},
  ]);
  // Apply filters to tickets for report
  let baseTix = tix.filter(t=>!t.archived);
  if((rSaved.appIds||[]).length||(rSaved.featIds||[]).length) baseTix=applyFilters(baseTix,'reports');
  setHead('Reports','Workspace analytics & team health');
  const at=baseTix, ae=epics.filter(e=>!e.archived), af2=feats.filter(f=>!f.archived), aa2=apps.filter(a=>!a.archived);
  const sc={};ST.forEach(s=>sc[s.v]=at.filter(t=>t.status===s.v).length);
  const mx=Math.max(...Object.values(sc),1),prod=sc.production,orph=at.filter(t=>!t.epicId),unassigned=at.filter(t=>!t.assignedTo);
  const topE=ae.map(e=>({id:e.id,title:e.title,n:at.filter(t=>t.epicId===e.id).length})).sort((a,b)=>b.n-a.n).slice(0,6);
  const appS=aa2.map(a=>{const af3=af2.filter(f=>f.appId===a.id),ae2=ae.filter(e=>af3.some(f=>f.id===e.featId)),at2=at.filter(t=>ae2.some(e=>e.id===t.epicId));return{id:a.id,title:a.title,f:af3.length,e:ae2.length,t:at2.length,p:at2.filter(t=>t.status==='production').length}}).sort((a,b)=>b.t-a.t);
  const tot=at.length||1;const r=34,cx=45,cy=45,ci=2*Math.PI*r;let off=0;
  const slices=ST.map(s=>{const fr=sc[s.v]/tot,da=fr*ci,ga=ci-da,el=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.col}" stroke-width="11" stroke-dasharray="${da.toFixed(1)} ${ga.toFixed(1)}" stroke-dashoffset="${(-off).toFixed(1)}" transform="rotate(-90 ${cx} ${cy})"/>`;off+=da;return el}).join('');
  const pc={}; PRIORITIES.forEach(p=>pc[p.v]=at.filter(t=>t.priority===p.v).length);
  const tc={}; TTYPES.forEach(t=>tc[t.v]=at.filter(x=>x.ticketType===t.v||(t.v==='story'&&!x.ticketType)).length);
  const userWorkload=users.map(u=>{const uTix=at.filter(t=>t.assignedTo===u.id);const bd={};ST.forEach(s=>bd[s.v]=uTix.filter(t=>t.status===s.v).length);return{u,total:uTix.length,bd}}).sort((a,b)=>b.total-a.total);
  document.getElementById('mc').innerHTML=`
  ${fbarHtml}
  <div class="r-grid">
    <div class="stat-card sc"><div class="stat-num">${at.length}</div><div class="stat-label">Total Tickets</div><div class="stat-sub">${tix.filter(t=>t.archived).length} archived</div></div>
    <div class="stat-card sy"><div class="stat-num">${sc.dev+sc.test}</div><div class="stat-label">In Flight</div><div class="stat-sub">Dev + Test</div></div>
    <div class="stat-card sg"><div class="stat-num">${prod}</div><div class="stat-label">In Production</div><div class="stat-sub">${Math.round(prod/tot*100)}% of active</div></div>
    <div class="stat-card sp"><div class="stat-num">${unassigned.length}</div><div class="stat-label">Unassigned</div><div class="stat-sub">${Math.round(unassigned.length/tot*100)}% need owner</div></div>
    <div class="stat-card sv"><div class="stat-num">${users.length}</div><div class="stat-label">Team Members</div><div class="stat-sub">${ae.length} active epics</div></div>
    <div class="stat-card sr"><div class="stat-num">${orph.length}</div><div class="stat-label">Orphan Tickets</div><div class="stat-sub">No epic linked</div></div>
  </div>
  <div class="rc mb">
    <div class="rct">Pipeline Flow</div>
    <div class="pip-steps">${ST.map(s=>`<div class="pip-step"><div class="pip-dot${sc[s.v]>0?' on':''}" style="color:${s.col};${sc[s.v]>0?`border-color:${s.col}`:''}">${sc[s.v]}</div><div class="pip-name">${s.l}</div></div>`).join('')}</div>
    ${ST.map(s=>`<div class="brow"><span class="blabel">${s.l}</span><div class="btrack"><div class="bfill" style="width:${sc[s.v]/mx*100}%;background:${s.col}"></div></div><span class="bcount">${sc[s.v]}</span></div>`).join('')}
  </div>
  <div class="r2">
    <div class="rc"><div class="rct">Status Breakdown</div><div class="dnut-wrap">
      <svg width="90" height="90" viewBox="0 0 90 90" style="flex-shrink:0">${slices}<text x="45" y="50" text-anchor="middle" font-family="Space Mono,monospace" font-size="13" font-weight="700" fill="${darkMode?'#e8e8f0':'#111118'}">${at.length}</text></svg>
      <div class="dnut-leg">${ST.map(s=>`<div class="dnut-li"><div class="dnut-dot" style="background:${s.col}"></div><span>${s.l}</span><span class="dnut-val">${sc[s.v]}</span></div>`).join('')}</div>
    </div></div>
    <div class="rc"><div class="rct">Ticket Types</div>
      ${TTYPES.map(t=>`<div class="brow"><span class="blabel">${t.icon} ${t.l}</span><div class="btrack"><div class="bfill" style="width:${at.length?tc[t.v]/at.length*100:0}%;background:var(--accent)"></div></div><span class="bcount">${tc[t.v]}</span></div>`).join('')}
      <div style="margin-top:10px"><div class="rct">Priority</div>
      ${PRIORITIES.map(p=>{const n=pc[p.v]||0;return`<div class="brow"><span class="blabel">${p.icon} ${p.l}</span><div class="btrack"><div class="bfill" style="width:${at.length?n/at.length*100:0}%;background:var(--accent)"></div></div><span class="bcount">${n}</span></div>`}).join('')}</div>
    </div>
  </div>
  <div class="rc mb"><div class="rct">Team Workload</div>
    ${userWorkload.length===0?'<div style="color:var(--text3);font-size:12px">No users.</div>':userWorkload.map(({u,total,bd})=>{
      const segs=ST.map(s=>{const spct=total>0?Math.round(bd[s.v]/total*100):0;return spct>0?`<div class="workload-seg" style="width:${spct}%;background:${s.col}" title="${s.l}: ${bd[s.v]}"></div>`:''}).join('');
      return`<div class="workload-row"><div class="workload-user"><span class="avatar avatar-sm" style="background:${u.color}">${u.initials}</span><span class="workload-name">${u.name}</span></div><div class="workload-bars">${segs||'<div style="height:8px;width:100%;background:var(--surface2);border-radius:3px"></div>'}</div><span class="bcount">${total}</span></div>`;
    }).join('')}
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border)">${ST.map(s=>`<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3)"><div style="width:8px;height:8px;border-radius:2px;background:${s.col}"></div>${s.l}</div>`).join('')}</div>
  </div>
  <div class="rc mb"><div class="rct">Assignment Detail</div>
    <div class="table-wrap" style="margin-bottom:0;box-shadow:none"><table>
      <thead><tr><th>User</th>${ST.map(s=>`<th>${s.l}</th>`).join('')}<th>Total</th><th>% Prod</th></tr></thead>
      <tbody>
        ${users.map(u=>{const ut=at.filter(t=>t.assignedTo===u.id);const cn={};ST.forEach(s=>cn[s.v]=ut.filter(t=>t.status===s.v).length);const pp=ut.length?Math.round(cn.production/ut.length*100):0;return`<tr><td><div style="display:flex;align-items:center;gap:7px"><span class="avatar" style="background:${u.color}">${u.initials}</span>${u.name}</div></td>${ST.map(s=>`<td style="font-family:var(--mono);font-size:11px">${cn[s.v]||'—'}</td>`).join('')}<td style="font-family:var(--mono);font-size:12px;font-weight:700">${ut.length}</td><td><div style="display:flex;align-items:center;gap:6px"><div class="btrack" style="width:60px"><div class="bfill" style="width:${pp}%;background:var(--green)"></div></div><span style="font-family:var(--mono);font-size:9px;color:var(--text3)">${pp}%</span></div></td></tr>`}).join('')}
        <tr style="background:var(--surface2)"><td style="font-weight:600">Unassigned</td>${ST.map(s=>`<td style="font-family:var(--mono);font-size:11px">${at.filter(t=>!t.assignedTo&&t.status===s.v).length||'—'}</td>`).join('')}<td style="font-family:var(--mono);font-size:12px;font-weight:700">${unassigned.length}</td><td>—</td></tr>
      </tbody></table></div>
  </div>
  <div class="rc mb"><div class="rct">App Health</div>
    ${appS.length?`<div class="table-wrap" style="margin-bottom:0;box-shadow:none"><table><thead><tr><th>App</th><th>Features</th><th>Epics</th><th>Tickets</th><th>In Prod</th><th>Progress</th></tr></thead><tbody>${appS.map(a=>{const pct=a.t?Math.round(a.p/a.t*100):0;return`<tr><td><span class="id-chip">${a.id}</span> ${a.title}</td><td style="color:var(--text2)">${a.f}</td><td style="color:var(--text2)">${a.e}</td><td style="color:var(--text2)">${a.t}</td><td><span class="tag tag-production">${a.p}</span></td><td><div style="display:flex;align-items:center;gap:7px"><div class="btrack" style="flex:1"><div class="bfill" style="width:${pct}%;background:var(--green)"></div></div><span style="font-family:var(--mono);font-size:9px;color:var(--text3)">${pct}%</span></div></td></tr>`}).join('')}</tbody></table></div>`:'<div style="color:var(--text3);font-size:12px">No apps yet.</div>'}
  </div>
  ${orph.length?`<div class="rc"><div class="rct">⚠ Orphan Tickets</div><div class="table-wrap" style="margin-bottom:0;box-shadow:none"><table><thead><tr><th>ID</th><th>Type</th><th>Title</th><th>Status</th><th>Priority</th><th>Assigned</th></tr></thead><tbody>${orph.slice(0,10).map(t=>`<tr><td><span class="id-chip">${t.id}</span></td><td>${tttag(t.ticketType||'story')}</td><td>${t.title}</td><td>${stag(t.status)}</td><td>${t.priority?ptag(t.priority):'—'}</td><td>${t.assignedTo?userPill(t.assignedTo):'—'}</td></tr>`).join('')}</tbody></table></div>${orph.length>10?`<div style="font-size:11px;color:var(--text3);padding:8px 0 0">…and ${orph.length-10} more</div>`:''}</div>`:''}`;
}

// CONFIGURATION (admin only)

function renderConfig() {
  if (!isAdmin()) { document.getElementById('mc').innerHTML=`<div class="empty"><div class="ico">🔒</div><p>Admin access required.</p></div>`; return; }
  setHead('Configuration','System settings & roles');
  document.getElementById('mc').innerHTML=`
  <div class="config-section">
    <div class="config-section-title">👤 Session — Switch User</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:12px">You are signed in as <strong>${sessionUser()?.name||'?'}</strong>. Switch to test different permission levels.</div>
    <select class="fs" style="max-width:260px" onchange="switchSession(this.value)">
      ${users.map(u=>`<option value="${u.id}"${u.id===sessionUserId?' selected':''}>${u.name} ${u.isAdmin?'(Admin)':'(User)'}</option>`).join('')}
    </select>
  </div>
  <div class="config-section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="config-section-title" style="margin-bottom:0">🎭 Roles</div>
      <button class="btn btn-primary btn-sm" onclick="openRoleM()">+ Add Role</button>
    </div>
    ${roles.map(r=>{
      const usedBy=users.filter(u=>u.roleId===r.id);
      return `<div class="role-row">
        <div>
          <div style="font-weight:500">${r.name}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">${usedBy.length?`Used by: ${usedBy.map(u=>u.name).join(', ')}`:'Not assigned to any user'}${r.system?' · System role':''}</div>
        </div>
        <div style="display:flex;gap:6px">
          ${!r.system?`<button class="btn btn-ghost btn-sm" onclick="openRoleM('${r.id}')">Edit</button>`:''}
          ${!r.system?`<button class="btn btn-danger btn-sm" onclick="delRole('${r.id}')">Delete</button>`:'<span style="font-size:11px;color:var(--text3)">System</span>'}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}
function switchSession(uid) {
  sessionUserId = uid;
  localStorage.setItem('px_session', uid);
  render();
  notify(`Switched to ${sessionUser()?.name}`);
}
function openRoleM(id=null) {
  const r=id?roles.find(x=>x.id===id):null;
  openM(r?'Edit Role':'New Role',`
    <div class="fg"><label class="fl">Role Name *</label><input class="fi" id="rn" value="${r?.name||''}" placeholder="e.g. Tech Lead"></div>`,
    `<button class="btn btn-ghost" onclick="closeM()">Cancel</button><button class="btn btn-primary" onclick="saveRole('${id||''}')">Save Role</button>`);
}
function saveRole(id) {
  const name=document.getElementById('rn').value.trim();
  if(!name){notify('Name required','⚠');return;}
  if(id){const i=roles.findIndex(r=>r.id===id);roles[i]={...roles[i],name};notify('Role updated');}
  else{roles.push({id:nid('ROLE'),name,system:false});notify('Role created');}
  save('roles',roles); closeM(); render();
}
function delRole(id) {
  const usedBy=users.filter(u=>u.roleId===id);
  if(usedBy.length){
    if(!confirm(`This role is used by: ${usedBy.map(u=>u.name).join(', ')}.\nDeleting it will unassign them. Continue?`))return;
    users=users.map(u=>u.roleId===id?{...u,roleId:null}:u); save('users',users);
  } else {
    if(!confirm('Delete this role?'))return;
  }
  roles=roles.filter(r=>r.id!==id); save('roles',roles); render(); notify('Role deleted');
}

function openM(title, body, foot, trailFn=null) {
  document.getElementById('mt').textContent=title;
  document.getElementById('mb').innerHTML=body;
  document.getElementById('mf').innerHTML=foot;
  document.getElementById('m-trail').innerHTML='';
  document.getElementById('ov').classList.add('open');
  if(trailFn) trailFn();
}
function closeM() { document.getElementById('ov').classList.remove('open'); }

function openTM(id=null) {

    <div class="form-row">
      <div class="fg" style="flex:1"><label class="fl">Title *</label><input class="fi" id="ft" value="${t?.title||''}" placeholder="Ticket title"></div>
      <div class="fg" style="width:90px;flex-shrink:0"><label class="fl">Order #</label><input class="fi" id="f-order" type="number" min="1" value="${t?.sortOrder||''}" placeholder="Auto" style="text-align:center"><div class="fd-hint" style="margin-top:4px">${t?.id?`<span class="modal-id-crumb">${t.id}</span>`:''}</div></div>
    </div>
    <div class="fg"><label class="fl">Type</label>${typeChips(t?.ticketType||'story')}</div>
    <div class="fg"><label class="fl">Description</label>${rteHtml('desc',t?.description||'','Describe this ticket…')}</div>
    <div class="fg"><label class="fl">Status</label>${statusChips(t?.status||'backlog')}</div>
    <div class="fg"><label class="fl">Priority</label>${priorityChips(t?.priority||'medium')}</div>
    <div class="form-section" style="margin-top:6px">Assignment</div>
    <div class="form-row">
      <div class="fg"><label class="fl">Assigned To</label><select class="fs" id="fassign">${userOpts(t?.assignedTo||'')}</select></div>
      <div class="fg"><label class="fl">Created By</label><select class="fs" id="fcreated">${userOpts(t?.createdBy||sessionUserId||'')}</select></div>
    </div>
    <div class="form-section" style="margin-top:6px">Hierarchy & Delivery</div>
    <div class="form-row">
      <div class="fg"><label class="fl">Epic (optional)</label><select class="fs" id="fe" onchange="updateTrail('ticket',{epicId:this.value})">${epicOpts(t?.epicId||'')}</select>${t?.epicId?`<div class="fd-hint"><span class="modal-id-crumb">${t.epicId}</span></div>`:''}</div>
      <div class="fg"><label class="fl">Sprint (optional)</label><select class="fs" id="fsprint">${sprintOpts(t?.sprintId||'')}</select></div>
    </div>
    <div class="fg"><label class="fl">Release (optional)</label><select class="fs" id="frelease">${releaseOpts(t?.releaseId||'')}</select></div>`,
    `<button class="btn btn-ghost" onclick="closeM()">Cancel</button><button class="btn btn-primary" onclick="saveT('${id||''}')">Save Ticket</button>`,
    ()=>updateTrail('ticket',t||{}));
}
function saveT(id) {
  const title=document.getElementById('ft').value.trim();
  if(!title){notify('Title required','⚠');return;}
  const now=new Date().toISOString();
  if(id){
    const i=tix.findIndex(t=>t.id===id),o={...tix[i]};
    const u={...tix[i],title,description:rteGet('desc'),ticketType:document.getElementById('ftype').value||'story',
      status:document.getElementById('fst').value,priority:document.getElementById('fpri').value,
      assignedTo:document.getElementById('fassign').value||null,createdBy:document.getElementById('fcreated').value||null,
      epicId:document.getElementById('fe').value||null,sprintId:document.getElementById('fsprint').value||null,
      releaseId:document.getElementById('frelease').value||null,
      sortOrder:document.getElementById('f-order').value?parseInt(document.getElementById('f-order').value):tix[i].sortOrder,
      updatedAt:now};
    addH(u,'Updated',diffFields(o,u,['title','status','priority','ticketType','assignedTo','epicId','sprintId','releaseId'])||'No changes');
    tix[i]=u; notify('Ticket updated');
  } else {
    const rec={id:nid('TKT'),title,description:rteGet('desc'),ticketType:document.getElementById('ftype').value||'story',
      status:document.getElementById('fst').value,priority:document.getElementById('fpri').value,
      assignedTo:document.getElementById('fassign').value||null,createdBy:document.getElementById('fcreated').value||sessionUserId||null,
      epicId:document.getElementById('fe').value||null,sprintId:document.getElementById('fsprint').value||null,
      releaseId:document.getElementById('frelease').value||null,
      sortOrder:document.getElementById('f-order').value?parseInt(document.getElementById('f-order').value):(tix.length+1),
      createdAt:now,updatedAt:now,archived:false,history:[]};
    addH(rec,'Created',`Type: ${rec.ticketType} | Status: ${rec.status} | Priority: ${rec.priority}`);
    tix.push(rec); notify('Ticket created');
  }
  save('tix',tix); closeM(); render();
}
function archT(id,unarch=false){if(!unarch&&!confirm('Archive this ticket?'))return;const i=tix.findIndex(t=>t.id===id);tix[i].archived=!unarch;tix[i].updatedAt=new Date().toISOString();addH(tix[i],unarch?'Unarchived':'Archived');save('tix',tix);render();notify(unarch?'Unarchived':'Archived')}
function delT(id){if(!confirm('Delete permanently?'))return;tix=tix.filter(t=>t.id!==id);save('tix',tix);render();notify('Deleted','🗑')}

// USER MODAL
const UCOLORS=['#6366f1','#0891b2','#16a34a','#d97706','#db2777','#7c3aed','#dc2626','#0d9488','#ea580c','#4f46e5'];
function openUM(id=null) {
  const u=id?users.find(x=>x.id===id):null;
  const appCheckboxes=apps.filter(a=>!a.archived).map(a=>`<label class="checkbox-row"><input type="checkbox" value="${a.id}"${(u?.appIds||[]).includes(a.id)?' checked':''} class="u-app-check"> ${a.title}</label>`).join('');
  openM(u?'Edit User':'Add Team Member',`
    <div class="form-row">
      <div class="fg"><label class="fl">Full Name *</label><input class="fi" id="fu-name" value="${u?.name||''}" placeholder="Jane Smith"></div>
      <div class="fg"><label class="fl">Initials *</label><input class="fi" id="fu-init" value="${u?.initials||''}" placeholder="JS" maxlength="3" style="text-transform:uppercase"></div>
    </div>
    <div class="form-row">
      <div class="fg"><label class="fl">Role</label><select class="fs" id="fu-role">${roleOpts(u?.roleId||'')}</select></div>
      <div class="fg"><label class="fl">Color</label>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:2px" id="cpicker">
          ${UCOLORS.map(c=>`<div onclick="selColor('${c}')" data-color="${c}" style="width:22px;height:22px;border-radius:50%;background:${c};cursor:pointer;border:2px solid ${(u?.color||UCOLORS[0])===c?'var(--text)':'transparent'};transition:border-color .15s"></div>`).join('')}
        </div>
        <input type="hidden" id="fu-color" value="${u?.color||UCOLORS[0]}">
      </div>
    </div>
    <div class="form-row">
      <div class="fg"><label class="fl">Admin</label><label class="checkbox-row" style="margin-top:4px"><input type="checkbox" id="fu-admin"${u?.isAdmin?' checked':''} style="width:16px;height:16px;cursor:pointer;accent-color:var(--accent)"> Grant admin access</label></div>
    </div>
    ${apps.length?`<div class="fg"><label class="fl">Apps Access</label><div style="display:flex;flex-direction:column;gap:4px;margin-top:2px">${appCheckboxes||'<span style="color:var(--text3);font-size:12px">No apps yet</span>'}</div></div>`:''}`,
    `<button class="btn btn-ghost" onclick="closeM()">Cancel</button><button class="btn btn-primary" onclick="saveU('${id||''}')">Save User</button>`);
}
function selColor(c) {
  document.getElementById('fu-color').value=c;
  document.querySelectorAll('#cpicker [data-color]').forEach(el=>el.style.border=`2px solid ${el.dataset.color===c?'var(--text)':'transparent'}`);
}
function saveU(id) {
  const name=document.getElementById('fu-name').value.trim();
  const initials=document.getElementById('fu-init').value.trim().toUpperCase();
  if(!name||!initials){notify('Name and initials required','⚠');return;}
  const now=new Date().toISOString();
  const roleId=document.getElementById('fu-role').value||null;
  const isAdmin=document.getElementById('fu-admin')?.checked||false;
  const appIds=[...document.querySelectorAll('.u-app-check:checked')].map(x=>x.value);
  const color=document.getElementById('fu-color').value;
  if(id){
    const i=users.findIndex(u=>u.id===id);
    users[i]={...users[i],name,initials,roleId,color,isAdmin,appIds,updatedAt:now};
    notify('User updated');
  } else {
    users.push({id:nid('USR'),name,initials,roleId,color,isAdmin,appIds,createdAt:now,history:[]});
    notify('User added');
  }
  save('users',users); closeM(); render();
}
function delU(id) {
  const has=tix.some(t=>t.assignedTo===id||t.createdBy===id);
  if(has&&!confirm('User has tickets. Remove anyway? Tickets become unassigned.'))return;
  if(!has&&!confirm('Delete user permanently?'))return;
  tix=tix.map(t=>({...t,assignedTo:t.assignedTo===id?null:t.assignedTo,createdBy:t.createdBy===id?null:t.createdBy}));
  save('tix',tix); users=users.filter(u=>u.id!==id); save('users',users); render(); notify('User removed','🗑');
}

function openD(hHtml,bHtml){document.getElementById('dh').innerHTML=hHtml;document.getElementById('db').innerHTML=bHtml;document.getElementById('dov').classList.add('open');document.getElementById('drawer').classList.add('open');}
function closeD(){document.getElementById('dov').classList.remove('open');document.getElementById('drawer').classList.remove('open');}
function dHead(badge,bc,id,title,createdAt,archived){
  return `<div style="flex:1"><div style="display:flex;align-items:center;gap:7px;margin-bottom:5px"><span class="type-badge ${bc}">${badge}</span><span class="id-chip">${id}</span>${archived?'<span class="tag tag-archived">Archived</span>':''}</div><div class="d-title">${title}</div><div class="d-sub">Created ${fdf(createdAt)}</div></div><button class="btn btn-ghost btn-icon" onclick="closeD()">✕</button>`;
}
function histHtml(h=[]){
  if(!h.length) return '<div style="color:var(--text3);font-size:12px;padding:10px 0">No history yet.</div>';
  return `<div class="hist">${h.map(x=>`<div class="hi"><span class="ht">${fdf(x.ts)}</span><span class="hd"><strong>${x.action}</strong>${x.details?' — '+x.details:''}</span></div>`).join('')}</div>`;
}
function drawerActions(type, id, archived) {
  const openFn={ticket:'openTM',epic:'openEM',feature:'openFM',app:'openAM'}[type];
  const archFn={ticket:'archT',epic:'archE',feature:'archF',app:'archA'}[type];
  const delFn ={ticket:'delT', epic:'delE', feature:'delF', app:'delA'}[type];
  return `<div class="d-actions">
    ${!archived?`<button class="btn btn-ghost btn-sm" onclick="closeD();${openFn}('${id}')">✎ Edit</button>`:''}
    ${!archived?`<button class="btn btn-ghost btn-sm" onclick="${archFn}('${id}')">Archive</button>`:`<button class="btn btn-ghost btn-sm" onclick="${archFn}('${id}',true)">↩ Unarchive</button>`}
    <button class="btn btn-danger btn-sm" onclick="${delFn}('${id}');closeD()">Delete</button>
  </div>`;
}

function openTD(id) {
  const t=tix.find(x=>x.id===id); if(!t)return;
  const crumb=t.epicId?epicBreadcrumb(t.epicId):null;
  const sp=t.sprintId?sprints.find(s=>s.id===t.sprintId):null;
  const rl=t.releaseId?releases.find(r=>r.id===t.releaseId):null;
  openD(dHead('TICKET','tb-ticket',t.id,t.title,t.createdAt,t.archived),`
    <div class="irow"><span class="ilabel">Order</span><span class="order-num" style="font-size:13px">${t.sortOrder??'—'}</span></div>
    <div class="irow"><span class="ilabel">Type</span>${tttag(t.ticketType||'story')||'<span style="color:var(--text3)">Story</span>'}</div>
    <div class="irow"><span class="ilabel">Status</span>${stag(t.status)}</div>
    <div class="irow"><span class="ilabel">Priority</span>${t.priority?ptag(t.priority):'<span style="color:var(--text3)">—</span>'}</div>
    <div class="irow"><span class="ilabel">Assigned To</span>${t.assignedTo?userPill(t.assignedTo):'<span style="color:var(--text3);font-size:12px">Unassigned</span>'}</div>
    <div class="irow"><span class="ilabel">Created By</span>${t.createdBy?userPill(t.createdBy):'<span style="color:var(--text3)">—</span>'}</div>
    <div class="irow"><span class="ilabel">Epic</span><span style="font-size:12px;color:var(--text2)">${crumb||'—'}${t.epicId?` <span class="id-chip">${t.epicId}</span>`:''}</span></div>
    <div class="irow"><span class="ilabel">Sprint</span><div style="flex:1;display:flex;align-items:center;justify-content:space-between;gap:8px">
      <span style="font-size:12px">${sp?`<span class="tag tag-sprint" style="font-size:10px">${sp.name}</span>`:'<span style="color:var(--text3)">—</span>'}</span>
      ${!t.archived?(!t.sprintId
        ? `<button class="btn btn-ghost btn-sm" onclick="addTicketToActiveSprint('${t.id}');openTD('${t.id}')">⚡ Add to Sprint</button>`
        : `<button class="btn btn-ghost btn-sm" onclick="removeTicketFromSprint('${t.id}');openTD('${t.id}')">✕ Remove</button>`)
      :''}
    </div></div>
    <div class="irow"><span class="ilabel">Release</span><span style="font-size:12px">${rl?`${rl.name}${rl.deployed?' <span class=\'tag tag-deployed\' style=\'font-size:9px\'>Deployed</span>':''}`:'<span style="color:var(--text3)">—</span>'}</span></div>
    <div class="irow"><span class="ilabel">Description</span><div class="rich-content" style="flex:1">${t.description||'<span style="color:var(--text3)">—</span>'}</div></div>
    <div class="irow"><span class="ilabel">Updated</span><span style="font-size:11px;color:var(--text3);font-family:var(--mono)">${fdf(t.updatedAt)}</span></div>
    ${drawerActions('ticket',t.id,t.archived)}
    <div style="margin-top:16px"><div class="section-label">History</div>${histHtml(t.history)}</div>`);
}
function openED(id) {
  const e=epics.find(x=>x.id===id); if(!e)return;
  const crumb=e.featId?featBreadcrumb(e.featId):null;
  const myT=tix.filter(t=>t.epicId===id&&!t.archived);
  openD(dHead('EPIC','tb-epic',e.id,e.title,e.createdAt,e.archived),`
    <div class="irow"><span class="ilabel">Order</span><span class="order-num" style="font-size:13px">${e.sortOrder??'—'}</span></div>
    <div class="irow"><span class="ilabel">Priority</span>${e.priority?ptag(e.priority):'—'}</div>
    <div class="irow"><span class="ilabel">Feature</span><span style="font-size:12px;color:var(--text2)">${crumb||'—'}${e.featId?` <span class="id-chip">${e.featId}</span>`:''}</span></div>
    <div class="irow"><span class="ilabel">Owner</span>${e.ownerId?userPill(e.ownerId):'<span style="color:var(--text3)">—</span>'}</div>
    <div class="irow"><span class="ilabel">Description</span><div class="rich-content" style="flex:1">${e.description||'<span style="color:var(--text3)">—</span>'}</div></div>
    <div class="irow"><span class="ilabel">Tickets</span><span class="tag tag-sprint">${myT.length}</span></div>
    ${myT.length?`<div class="table-wrap" style="margin-top:10px;margin-bottom:0"><table><thead><tr><th>ID</th><th>Type</th><th>Title</th><th>Status</th><th>Priority</th><th>Assigned</th></tr></thead><tbody>${myT.map(t=>`<tr onclick="closeD();setTimeout(()=>openTD('${t.id}'),50)"><td><span class="id-chip">${t.id}</span></td><td>${tttag(t.ticketType||'story')}</td><td style="font-size:13px">${t.title}</td><td>${stag(t.status)}</td><td>${t.priority?ptag(t.priority):'—'}</td><td>${t.assignedTo?userAvatar(t.assignedTo):'—'}</td></tr>`).join('')}</tbody></table></div>`:''}
    ${drawerActions('epic',e.id,e.archived)}
    <div style="margin-top:16px"><div class="section-label">History</div>${histHtml(e.history)}</div>`);
}
function openFD(id) {
  const f=feats.find(x=>x.id===id); if(!f)return;
  const app=f.appId?apps.find(a=>a.id===f.appId):null;
  const myE=epics.filter(e=>e.featId===id&&!e.archived);
  openD(dHead('FEATURE','tb-feat',f.id,f.title,f.createdAt,f.archived),`
    <div class="irow"><span class="ilabel">Order</span><span class="order-num" style="font-size:13px">${f.sortOrder??'—'}</span></div>
    <div class="irow"><span class="ilabel">Priority</span>${f.priority?ptag(f.priority):'—'}</div>
    <div class="irow"><span class="ilabel">App</span><span style="font-size:13px">${app?`${app.title} <span class="id-chip">${app.id}</span>`:'—'}</span></div>
    <div class="irow"><span class="ilabel">Description</span><div class="rich-content" style="flex:1">${f.description||'<span style="color:var(--text3)">—</span>'}</div></div>

    ${drawerActions('feature',f.id,f.archived)}

}
function openAD(id) {
  const a=apps.find(x=>x.id===id); if(!a)return;
  const myF=feats.filter(f=>f.appId===id&&!f.archived);
  openD(dHead('APP','tb-app',a.id,a.title,a.createdAt,a.archived),`
    <div class="irow"><span class="ilabel">Order</span><span class="order-num" style="font-size:13px">${a.sortOrder??'—'}</span></div>

    ${drawerActions('app',a.id,a.archived)}
    <div style="margin-top:16px"><div class="section-label">History</div>${histHtml(a.history)}</div>`);
}
function openUD(id) {
  const u=users.find(x=>x.id===id); if(!u)return;
  const myTix=tix.filter(t=>t.assignedTo===id&&!t.archived);
  const createdTix=tix.filter(t=>t.createdBy===id);
  const sc={}; ST.forEach(s=>sc[s.v]=myTix.filter(t=>t.status===s.v).length);
  const userApps=apps.filter(a=>(u.appIds||[]).includes(a.id));
  openD(`<div style="flex:1"><div style="display:flex;align-items:center;gap:12px;margin-bottom:4px">
    <span class="avatar avatar-lg" style="background:${u.color}">${u.initials}</span>
    <div><div class="d-title">${u.name}${u.isAdmin?' <span class="sb-admin-badge">ADMIN</span>':''}</div><div class="d-sub">${roleLabel(u.roleId)} · <span class="id-chip">${u.id}</span></div></div>
  </div></div><button class="btn btn-ghost btn-icon" onclick="closeD()">✕</button>`,
  `<div class="irow"><span class="ilabel">Assigned</span><span style="font-family:var(--mono);font-size:13px;font-weight:700">${myTix.length} tickets</span></div>
   <div class="irow"><span class="ilabel">Created</span><span style="font-family:var(--mono);font-size:13px">${createdTix.length} tickets</span></div>
   ${userApps.length?`<div class="irow"><span class="ilabel">Apps</span><div style="flex:1;display:flex;gap:5px;flex-wrap:wrap">${userApps.map(a=>`<span class="id-chip">${a.title}</span>`).join('')}</div></div>`:''}
   <div style="margin-top:12px;margin-bottom:12px">${ST.map(s=>`<div class="brow"><span class="blabel">${s.l}</span><div class="btrack"><div class="bfill" style="width:${myTix.length?sc[s.v]/myTix.length*100:0}%;background:${s.col}"></div></div><span class="bcount">${sc[s.v]}</span></div>`).join('')}</div>
   ${myTix.length?`<div class="section-label">Assigned Tickets</div><div class="table-wrap" style="margin-bottom:0"><table><thead><tr><th>ID</th><th>Type</th><th>Title</th><th>Status</th></tr></thead><tbody>${myTix.slice(0,10).map(t=>`<tr><td><span class="id-chip">${t.id}</span></td><td>${tttag(t.ticketType||'story')}</td><td style="font-size:13px">${t.title}</td><td>${stag(t.status)}</td></tr>`).join('')}</tbody></table></div>`:''}
   <div class="d-actions">
     <button class="btn btn-ghost btn-sm" onclick="closeD();openUM('${id}')">✎ Edit User</button>
     <button class="btn btn-danger btn-sm" onclick="closeD();delU('${id}')">Remove User</button>
   </div>`);
}

  setHead('Help & Guide', 'Learn how to use PRODEX effectively');
  document.getElementById('mc').innerHTML = `

  <!-- HERO -->
  <div class="help-hero">
    <div class="help-hero-title">Welcome to PRODEX ✦</div>
    <div class="help-hero-sub">PRODEX is a product management workspace that helps your team plan, track, and ship software. This guide covers every feature — from setting up your product hierarchy to running sprints and deploying releases. Use the quick-links below to jump to any section.</div>
  </div>

  <!-- TABLE OF CONTENTS -->
  <div class="help-toc">
    <a class="help-toc-chip" onclick="document.getElementById('h-flow').scrollIntoView({behavior:'smooth'})">⬡ Product Flow</a>
    <a class="help-toc-chip" onclick="document.getElementById('h-backlog').scrollIntoView({behavior:'smooth'})">◈ Backlog</a>
    <a class="help-toc-chip" onclick="document.getElementById('h-sprints').scrollIntoView({behavior:'smooth'})">⚡ Sprints</a>
    <a class="help-toc-chip" onclick="document.getElementById('h-hierarchy').scrollIntoView({behavior:'smooth'})">◉ Hierarchy</a>
    <a class="help-toc-chip" onclick="document.getElementById('h-tickets').scrollIntoView({behavior:'smooth'})">◑ Tickets</a>
    <a class="help-toc-chip" onclick="document.getElementById('h-releases').scrollIntoView({behavior:'smooth'})">🚀 Releases</a>
    <a class="help-toc-chip" onclick="document.getElementById('h-users').scrollIntoView({behavior:'smooth'})">◎ Users & Roles</a>
    <a class="help-toc-chip" onclick="document.getElementById('h-reports').scrollIntoView({behavior:'smooth'})">▣ Reports</a>
    <a class="help-toc-chip" onclick="document.getElementById('h-config').scrollIntoView({behavior:'smooth'})">⚙ Configuration</a>
    <a class="help-toc-chip" onclick="document.getElementById('h-tips').scrollIntoView({behavior:'smooth'})">💡 Tips & Shortcuts</a>
  </div>

  <!-- ─── PRODUCT FLOW ─── -->
  <div class="help-section" id="h-flow">
    <div class="help-section-title"><span class="help-section-ico">⬡</span> The PRODEX Product Flow</div>
    <div class="help-section-sub">How ideas move from concept to production</div>
    <div class="help-body">
      <p>PRODEX is built around a deliberate hierarchy that mirrors how great product teams think. Work flows top-down during planning and bottom-up during execution. Here is the complete lifecycle:</p>
    </div>

    <!-- Flow diagram -->
    <div class="help-flow">
      <div class="help-flow-step">
        <div class="help-flow-badge" style="background:rgba(219,39,119,.1)">◉</div>
        <div class="help-flow-label">App</div>
        <div class="help-flow-desc">Top-level product or service</div>
      </div>
      <div class="help-flow-step">
        <div class="help-flow-badge" style="background:rgba(124,58,237,.1)">◧</div>
        <div class="help-flow-label">Feature</div>
        <div class="help-flow-desc">A capability within the app</div>
      </div>
      <div class="help-flow-step">
        <div class="help-flow-badge" style="background:rgba(180,83,9,.1)">◐</div>
        <div class="help-flow-label">Epic</div>
        <div class="help-flow-desc">A theme of work inside a feature</div>
      </div>
      <div class="help-flow-step">
        <div class="help-flow-badge" style="background:rgba(8,145,178,.1)">◑</div>
        <div class="help-flow-label">Ticket</div>
        <div class="help-flow-desc">Individual unit of work</div>
      </div>
      <div class="help-flow-step">
        <div class="help-flow-badge" style="background:rgba(91,83,240,.1)">⚡</div>
        <div class="help-flow-label">Sprint</div>
        <div class="help-flow-desc">Time-boxed execution period</div>
      </div>
      <div class="help-flow-step">
        <div class="help-flow-badge" style="background:rgba(22,163,74,.1)">🚀</div>
        <div class="help-flow-label">Release</div>
        <div class="help-flow-desc">Deployable bundle of tickets</div>
      </div>
    </div>

    <div class="help-divider"></div>

    <div class="help-body">
      <p><strong>Step 1 — Define your Apps.</strong> Start by creating an App for each product, service, or codebase your team works on. Apps are the highest level of organisation. Example: "Mobile App", "Admin Dashboard", "API Gateway".</p>

      <p><strong>Step 2 — Break Apps into Features.</strong> A Feature represents a distinct capability or area within an App. Features help you group related work. Example: inside "Mobile App" you might have "Onboarding", "Payments", "Notifications".</p>

      <p><strong>Step 3 — Create Epics inside Features.</strong> An Epic is a theme of work — bigger than a single ticket but smaller than a feature. Epics give your team a shared goal. Example: inside "Onboarding" you might have "Email Verification Flow", "Profile Setup Wizard".</p>

      <p><strong>Step 4 — Break Epics into Tickets.</strong> Tickets are the atomic units of work: Stories (new functionality), Bugs (defects to fix), or Spikes (research / investigation). Each ticket has a status that moves through the pipeline: Backlog → In Sprint → In Dev → In Test → Ready for Prod → In Production.</p>

      <p><strong>Step 5 — Plan Sprints.</strong> Sprints are time-boxed periods (usually 2 weeks) where your team commits to completing a set of tickets. Create a sprint, set an objective and date range, activate it, then pull tickets from the backlog into it.</p>

      <p><strong>Step 6 — Ship Releases.</strong> When a set of tickets is ready to go out together, bundle them into a Release. The Release tracks which tickets are included and gives you a formatted summary to share with stakeholders. When you click Deploy, all linked tickets are automatically moved to "In Production".</p>
    </div>

    <div class="help-tip"><strong>💡 Tip:</strong> You don't need to use every level for every piece of work. A small bug fix can live as a standalone ticket with no epic. The hierarchy is there to help — not to slow you down.</div>
  </div>

  <!-- ─── BACKLOG ─── -->
  <div class="help-section" id="h-backlog">
    <div class="help-section-title"><span class="help-section-ico">◈</span> Backlog</div>
    <div class="help-section-sub">Your queue of work waiting to be picked up</div>
    <div class="help-body">
      <p>The Backlog is a filtered view showing all tickets with status <strong>Backlog</strong>. It is your staging area — the place where new work lands before it's assigned to a sprint.</p>

      <p><strong>Quick Add:</strong> Use the quick-entry bar at the top to create a ticket in seconds. Type a title, pick a status, optionally link it to an Epic and assign it, then press <span class="help-kbd">Enter</span> or click Add.</p>

      <p><strong>Adding to the active sprint:</strong> Hover any row to reveal the row actions. Click <strong>⚡ Sprint</strong> to instantly move that ticket into the currently active sprint. Its status changes from Backlog to "In Sprint" automatically. If no sprint is active, you'll see a warning to activate one first.</p>

      <p><strong>Filter chips:</strong> Use the App, Feature, and Epic filter chips below the quick-entry bar to narrow the view. Filters are remembered per session. Click <strong>✕ Clear</strong> to reset.</p>

      <p><strong>Reorder:</strong> Drag the <strong>⠿</strong> handle on any row to reorder items. The order number (#) column reflects the saved sort position.</p>
    </div>
    <div class="help-tip"><strong>💡 Tip:</strong> Keep your backlog groomed. Before each sprint, review the backlog, update priorities, and archive tickets that are no longer relevant.</div>
  </div>

  <!-- ─── SPRINTS ─── -->
  <div class="help-section" id="h-sprints">
    <div class="help-section-title"><span class="help-section-ico">⚡</span> Sprints</div>
    <div class="help-section-sub">Time-boxed execution periods for your team</div>
    <div class="help-body">
      <p>Sprints let your team commit to a focused set of work within a fixed window — typically two weeks. PRODEX supports one <strong>active sprint</strong> at a time, with all past sprints preserved in the Archived tab for reference.</p>

      <p><strong>Creating a sprint:</strong> Click <strong>+ New Sprint</strong>. Give it a name (e.g. "Sprint 7 — Auth"), write an objective (the one-sentence goal the team is aiming for), and set start and end dates. The date range defaults to today plus two weeks.</p>

      <p><strong>Activating a sprint:</strong> Click <strong>▶ Activate</strong> on any inactive sprint. Only one sprint can be active at a time — activating a new one deactivates the previous one.</p>

      <p><strong>Adding tickets:</strong> There are three ways to put tickets into a sprint:
        <ul>
          <li>Click <strong>+ Add Tickets</strong> on the sprint card to open a multi-select picker showing all unassigned tickets. Check the ones you want and click Add Selected.</li>
          <li>Hover any ticket row in the Backlog or All Tickets view and click <strong>⚡ Sprint</strong> in the row actions.</li>
          <li>Open a ticket drawer and click <strong>⚡ Add to Sprint</strong> next to the Sprint field.</li>
        </ul>
      </p>

      <p><strong>Removing tickets:</strong> Hover a ticket row inside the sprint card and click <strong>✕ Sprint</strong> in the row actions. The ticket reverts to Backlog status.</p>

      <p><strong>Views — List vs Swimlane:</strong> Toggle between views using the buttons at the top right. <strong>List view</strong> shows a sortable table per sprint. <strong>Swimlane view</strong> shows a 6-column Kanban board organised by status, so you can see work flow visually across Backlog → In Dev → In Test → Ready for Prod → In Production.</p>

      <p><strong>Completing a sprint:</strong> Click <strong>✓ Complete</strong> to archive the sprint and move it to the historical record. Tickets remain linked to the sprint for reporting purposes.</p>
    </div>
    <div class="help-tip"><strong>💡 Sprint Objective:</strong> Always fill in the sprint objective. A clear one-sentence goal ("Ship the email verification flow end-to-end") keeps the team aligned and makes retrospectives easier.</div>
  </div>

  <!-- ─── HIERARCHY ─── -->
  <div class="help-section" id="h-hierarchy">
    <div class="help-section-title"><span class="help-section-ico">◉</span> Apps, Features & Epics</div>
    <div class="help-section-sub">The three levels of product organisation above tickets</div>

    <div class="help-2col">
      <div class="help-card">
        <div class="help-card-title">◉ Apps</div>
        <div class="help-card-body">The highest level. Represents a distinct product, service, or codebase. Everything in PRODEX belongs (directly or indirectly) to an App. Create one App per product line.</div>
      </div>
      <div class="help-card">
        <div class="help-card-title">◧ Features</div>
        <div class="help-card-body">A functional capability within an App. Features group related Epics. Use Features to represent major product areas like "Search", "Checkout", or "User Settings".</div>
      </div>
      <div class="help-card">
        <div class="help-card-title">◐ Epics</div>
        <div class="help-card-body">A body of work inside a Feature. An Epic has an owner, a description, and contains multiple tickets. Use Epics for initiatives that span multiple sprints.</div>
      </div>
      <div class="help-card">
        <div class="help-card-title">Breadcrumbs</div>
        <div class="help-card-body">When editing an Epic, the feature dropdown shows "App › Feature" paths. When editing a Ticket, the epic dropdown shows "App › Feature › Epic" paths — so you always know where something lives.</div>
      </div>
    </div>

    <div class="help-body" style="margin-top:12px">
      <p><strong>Creating items:</strong> Click <strong>+ New [Item]</strong> in any view's page header. Fill in the title, description (supports rich text), priority, and hierarchy links. Every item gets a unique ID (APP-0001, FTR-0001, EPC-0001) that is shown discreetly below the relevant dropdowns in the form.</p>
      <p><strong>Archiving vs Deleting:</strong> Archiving hides an item from active views but preserves it — it remains visible in the Archived tab and its history is intact. You can unarchive at any time. Deleting is permanent and blocked if the item has active children (e.g. you cannot delete a Feature that still has active Epics).</p>
      <p><strong>Priority:</strong> All items (Apps, Features, Epics, Tickets) support four priority levels: Critical 🔴, High 🟠, Medium 🟡, Low 🟢. Priority is shown in tables and drawers.</p>
      <p><strong>Order number:</strong> Drag the <strong>⠿</strong> handle to reorder rows. You can also type an order number directly in the form to jump an item to a specific position.</p>
    </div>
  </div>

  <!-- ─── TICKETS ─── -->
  <div class="help-section" id="h-tickets">
    <div class="help-section-title"><span class="help-section-ico">◑</span> Tickets</div>
    <div class="help-section-sub">The atomic unit of work — stories, bugs, and spikes</div>
    <div class="help-body">
      <p>A Ticket represents a single piece of work. Every ticket has a <strong>type</strong>, a <strong>status</strong>, and a <strong>priority</strong>.</p>

      <p><strong>Ticket Types:</strong></p>
      <ul>
        <li><strong>📖 Story</strong> — New functionality or an improvement to existing behaviour. Most tickets are stories.</li>
        <li><strong>🐛 Bug</strong> — A defect or regression. Something that is broken and needs fixing.</li>
        <li><strong>⚡ Spike</strong> — Research, investigation, or technical discovery. Time-boxed exploration with a written outcome rather than shippable code.</li>
      </ul>

      <p><strong>Status Pipeline:</strong> Tickets move through six stages:</p>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 12px">
        <span class="tag tag-backlog">Backlog</span>
        <span style="color:var(--text3);padding:2px">→</span>
        <span class="tag tag-sprint">In Sprint</span>
        <span style="color:var(--text3);padding:2px">→</span>
        <span class="tag tag-dev">In Dev</span>
        <span style="color:var(--text3);padding:2px">→</span>
        <span class="tag tag-test">In Test</span>
        <span style="color:var(--text3);padding:2px">→</span>
        <span class="tag tag-readyprod">Ready for Prod</span>
        <span style="color:var(--text3);padding:2px">→</span>
        <span class="tag tag-production">In Production</span>
      </div>

      <p>Change status by editing the ticket and selecting a new status chip, or by dragging the ticket to a different swimlane column in Sprint view.</p>

      <p><strong>Linking to hierarchy:</strong> A ticket can be linked to an Epic (and inherits the Epic's Feature and App chain). It can also be linked to a Sprint and a Release independently — allowing a ticket to be worked on in Sprint 3 but deployed as part of Release v2.1.</p>

      <p><strong>Rich text description:</strong> The description field is a full rich-text editor. Use the toolbar to add headings, bold/italic, bullet lists, numbered lists, code blocks, blockquotes, links, highlights, and dividers. Formatting is preserved and rendered when you view the ticket in the detail drawer.</p>

      <p><strong>History:</strong> Every create, edit, archive, or sprint change is automatically logged in the ticket's history. Open the detail drawer and scroll to the bottom to see the full audit trail.</p>
    </div>
    <div class="help-tip"><strong>💡 Tip:</strong> Use Spikes sparingly and always define a clear time-box and expected output upfront (e.g. "2 days — deliver a written recommendation on which auth library to use").</div>
  </div>

  <!-- ─── RELEASES ─── -->
  <div class="help-section" id="h-releases">
    <div class="help-section-title"><span class="help-section-ico">🚀</span> Releases</div>
    <div class="help-section-sub">Bundle and deploy groups of tickets together</div>
    <div class="help-body">
      <p>A Release is a named, versioned bundle of tickets that are deployed together. Releases are independent of Sprints — a release may contain tickets from multiple sprints, or a single sprint may produce multiple releases.</p>

      <p><strong>Creating a Release:</strong> Click <strong>+ New Release</strong>. Give it a name (e.g. "v2.3.0 — Payment Improvements"), a rich-text description (release notes), and an optional target date.</p>

      <p><strong>Linking tickets:</strong> Open any ticket and select a Release from the Release dropdown in the form. The ticket will appear in that release's summary. You can link tickets from different sprints or epics to the same release.</p>

      <p><strong>Deploying:</strong> Click <strong>🚀 Deploy</strong> on a release card. PRODEX will confirm the action, then automatically move all linked tickets to <strong>In Production</strong> status and timestamp the deployment.</p>

      <p><strong>Release Summary:</strong> Click <strong>📋 Copy Summary</strong> to generate a formatted plain-text summary of the release, including ticket counts by type and a per-ticket status breakdown. The summary is copied to your clipboard and also shown in a modal so you can review it before sharing.</p>

      <p>A deployed release is visually highlighted with a green left border and a <span class="tag tag-deployed" style="display:inline-flex;padding:1px 6px;font-size:10px">✓ Deployed</span> badge, making it easy to distinguish past releases from upcoming ones.</p>
    </div>
    <div class="help-tip"><strong>💡 Tip:</strong> Use the Release description field to write your changelog or release notes. They are preserved and included in the shareable summary, making it easy to communicate what shipped to stakeholders or customers.</div>
  </div>

  <!-- ─── USERS & ROLES ─── -->
  <div class="help-section" id="h-users">
    <div class="help-section-title"><span class="help-section-ico">◎</span> Users & Roles</div>
    <div class="help-section-sub">Manage your team and their permissions</div>
    <div class="help-body">
      <p><strong>Adding a user:</strong> Go to the Users section and click <strong>+ Add User</strong>. Fill in the name, initials (2–3 characters, shown in avatars), pick a colour, assign a role, and optionally mark the user as an Admin.</p>

      <p><strong>Roles:</strong> Roles are defined in the Configuration section (admin only). Default roles include Product Manager, Developer, QA Engineer, Designer, and Scrum Master. You can create custom roles. A role cannot be deleted if it is currently assigned to any user — you'll be warned and given the chance to continue (which will unassign the role from those users).</p>

      <p><strong>App access:</strong> When creating or editing a user, you can assign them to specific Apps. This is informational — it lets you see which team members work on which products from the user detail drawer.</p>

      <p><strong>Admin users:</strong> Admin users can access the Configuration section (roles, session switching). Non-admin users cannot see the Configuration nav item at all. Mark a user as Admin by checking the <em>Grant admin access</em> checkbox in the user form.</p>

      <p><strong>Session switching:</strong> In Configuration, you can switch the active session to any user to test what the app looks like from their perspective. The current session user is shown in the sidebar footer.</p>

      <p><strong>Ticket assignment:</strong> Tickets have two user fields: <em>Assigned To</em> (the person responsible for the work) and <em>Created By</em> (who raised the ticket). Both are optional but recommended for good team visibility.</p>
    </div>
    <div class="help-tip"><strong>💡 Tip:</strong> Keep at least one admin user active at all times so you always have access to Configuration. If you're the only admin, don't remove yourself from that role.</div>
  </div>

  <!-- ─── REPORTS ─── -->
  <div class="help-section" id="h-reports">
    <div class="help-section-title"><span class="help-section-ico">▣</span> Reports</div>
    <div class="help-section-sub">Analytics and health metrics for your workspace</div>
    <div class="help-body">
      <p>The Reports section gives you a real-time overview of your team's work. All panels update immediately as tickets change.</p>

      <p><strong>Filtering:</strong> Use the <em>Project</em> and <em>Feature</em> filter chips at the top of the Reports page to scope all panels to a specific app or feature. This is useful during stakeholder meetings when you want to discuss one product line.</p>

      <p><strong>Panels available:</strong></p>
      <ul>
        <li><strong>KPI Cards</strong> — Total tickets, in-flight count (Dev + Test), in-production count, unassigned tickets, team size, and orphan ticket count (tickets not linked to any epic).</li>
        <li><strong>Pipeline Flow</strong> — Bar chart showing how many tickets are at each stage.</li>
        <li><strong>Status Breakdown</strong> — Donut chart of ticket distribution by status.</li>
        <li><strong>Ticket Types</strong> — Distribution of Stories vs Bugs vs Spikes, plus Priority breakdown.</li>
        <li><strong>Team Workload</strong> — Stacked bar per team member showing their ticket load by status.</li>
        <li><strong>Assignment Detail</strong> — Table breakdown per user showing counts at every pipeline stage plus their % in production.</li>
        <li><strong>App Health</strong> — Per-app table showing feature count, epic count, ticket count, production count, and a progress bar.</li>
        <li><strong>Orphan Tickets</strong> — Tickets not linked to any Epic, flagged so you can clean them up.</li>
      </ul>
    </div>
    <div class="help-tip"><strong>💡 Tip:</strong> If you notice a large number of Orphan Tickets, do a quick grooming session to link them to the right epics. Unlinked tickets make your App Health and Epic tracking inaccurate.</div>
  </div>

  <!-- ─── CONFIGURATION ─── -->
  <div class="help-section" id="h-config">
    <div class="help-section-title"><span class="help-section-ico">⚙</span> Configuration</div>
    <div class="help-section-sub">Admin-only system settings</div>
    <div class="help-body">
      <p>The Configuration section is only visible and accessible to <strong>admin users</strong>. Non-admin users will not see it in the sidebar.</p>

      <p><strong>Session Switcher:</strong> Switch the active session to any user in the workspace. This lets admins test the app from different permission perspectives without logging in and out. The current session user is shown in the sidebar footer at all times.</p>

      <p><strong>Roles:</strong> View all roles in the system, create new ones, edit names, and delete unused roles. The <em>Admin</em> role is a system role and cannot be deleted. Before deleting a role that is assigned to users, PRODEX will warn you which users will be affected and ask for confirmation.</p>
    </div>
    <div class="help-tip"><strong>💡 Tip:</strong> Create role names that match your actual team titles (e.g. "Senior Engineer", "Principal PM") — this makes the Users view much more meaningful at a glance.</div>
  </div>

  <!-- ─── TIPS & SHORTCUTS ─── -->
  <div class="help-section" id="h-tips">
    <div class="help-section-title"><span class="help-section-ico">💡</span> Tips & Shortcuts</div>
    <div class="help-section-sub">Get more done, faster</div>

    <div class="help-2col">
      <div class="help-card">
        <div class="help-card-title">Keyboard Shortcuts</div>
        <div class="help-card-body" style="display:flex;flex-direction:column;gap:6px">
          <div><span class="help-kbd">Esc</span> Close modal or drawer</div>
          <div><span class="help-kbd">Enter</span> Submit quick-entry ticket</div>
          <div><span class="help-kbd">⌘ K</span> or <span class="help-kbd">Ctrl K</span> Insert link in rich text editor</div>
          <div><span class="help-kbd">Tab</span> Indent list in rich text editor</div>
          <div><span class="help-kbd">⇧ Tab</span> Outdent list in rich text editor</div>
        </div>
      </div>
      <div class="help-card">
        <div class="help-card-title">Rich Text Editor</div>
        <div class="help-card-body">Use the toolbar in any description field to format text. Supports headings (H1–H3), bold, italic, underline, strikethrough, inline code, code blocks, blockquotes, bullet and numbered lists, highlights, links, and alignment. Formatting is preserved in detail drawers.</div>
      </div>
      <div class="help-card">
        <div class="help-card-title">Drag to Reorder</div>
        <div class="help-card-body">Grab the <strong>⠿</strong> handle on any table row to reorder items. The new order is saved immediately. You can also set the order number manually in the edit form, or leave it blank to auto-assign.</div>
      </div>
      <div class="help-card">
        <div class="help-card-title">Filter Chips</div>
        <div class="help-card-body">Chip filters on the Features, Epics, All Tickets, and Reports pages are <strong>persisted locally</strong> — your filter selections survive page navigation. Click <strong>✕ Clear</strong> to reset them.</div>
      </div>
      <div class="help-card">
        <div class="help-card-title">Archive First, Delete Last</div>
        <div class="help-card-body">Archive items to hide them without losing their history. Items in the Archived tab can be unarchived at any time. Only delete items you are certain you no longer need — deletion is permanent and blocked if the item has active children.</div>
      </div>
      <div class="help-card">
        <div class="help-card-title">Dark Mode</div>
        <div class="help-card-body">Toggle between light and dark mode using the 🌙 / ☀️ button in the top-left corner of the sidebar. Your preference is saved locally and persists across sessions.</div>
      </div>
      <div class="help-card">
        <div class="help-card-title">Data Storage</div>
        <div class="help-card-body">All data is stored in your browser's <strong>localStorage</strong>. Nothing leaves your device. If you clear browser data, your workspace will reset. For long-term use, export or back up your data periodically by copying the localStorage contents.</div>
      </div>
      <div class="help-card">
        <div class="help-card-title">ID System</div>
        <div class="help-card-body">Every item gets a unique auto-incremented ID: <code>APP-</code>, <code>FTR-</code>, <code>EPC-</code>, <code>TKT-</code>, <code>SPR-</code>, <code>REL-</code>, <code>USR-</code>. IDs are shown as muted chips in tables, drawers, and forms. They are permanent — they never change even if you edit the item's title.</div>
      </div>
    </div>

    <div class="help-divider"></div>

    <div class="help-body">
      <p style="font-size:12px;color:var(--text3);text-align:center">PRODEX stores all data locally in your browser. No account, no server, no tracking.</p>
    </div>
  </div>
  `;
}

// DRAG & DROP ENGINE
// ══════════════════════════════════════════════════════════
const STORES = {tix:()=>tix, epics:()=>epics, feats:()=>feats, apps:()=>apps};
const SAVE_K = {tix:'tix', epics:'epics', feats:'feats', apps:'apps'};
let _dragId=null, _dragStore=null;
function dragStart(e){const row=e.currentTarget;_dragId=row.dataset.id;_dragStore=row.dataset.store;row.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',_dragId);}
function dragEnd(e){e.currentTarget.classList.remove('dragging');document.querySelectorAll('tr.drag-over').forEach(r=>r.classList.remove('drag-over'));}
function dragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';const target=e.currentTarget;if(target.dataset.id!==_dragId&&target.dataset.store===_dragStore){document.querySelectorAll('tr.drag-over').forEach(r=>r.classList.remove('drag-over'));target.classList.add('drag-over');}}
function dragLeave(e){e.currentTarget.classList.remove('drag-over');}
function drop(e, storeKey){
  e.preventDefault();const targetRow=e.currentTarget;targetRow.classList.remove('drag-over');
  const targetId=targetRow.dataset.id;
  if(!_dragId||_dragId===targetId||_dragStore!==storeKey)return;
  const arr=STORES[storeKey]();
  const fromIdx=arr.findIndex(r=>r.id===_dragId), toIdx=arr.findIndex(r=>r.id===targetId);
  if(fromIdx===-1||toIdx===-1)return;
  const [moved]=arr.splice(fromIdx,1); arr.splice(toIdx,0,moved);
  let c=1; arr.forEach(item=>{if(!item.archived) item.sortOrder=c++;});
  save(SAVE_K[storeKey],arr); render(); notify('Order saved ✦');
}

// RICH TEXT EDITOR
// ══════════════════════════════════════════════════════════
let _savedRange=null;
function rteHtml(id,content='',placeholder='Add a description…'){
  return `<div class="rte-wrap" id="rte-${id}">
    <div class="rte-toolbar" onmousedown="event.preventDefault()">
      <select class="rte-select" onchange="rteBlock(this.value,'${id}')" title="Style">
        <option value="p">Paragraph</option><option value="h1">Heading 1</option><option value="h2">Heading 2</option><option value="h3">Heading 3</option><option value="pre">Code block</option>
      </select>
      <div class="rte-sep"></div>
      <button class="rte-btn" onclick="rteCmd('bold')" title="Bold"><b>B</b></button>
      <button class="rte-btn" onclick="rteCmd('italic')" title="Italic"><i>I</i></button>
      <button class="rte-btn" onclick="rteCmd('underline')" title="Underline"><u>U</u></button>
      <button class="rte-btn" onclick="rteCmd('strikeThrough')" title="Strike"><s>S</s></button>
      <button class="rte-btn" onclick="rteInlineCode('${id}')" title="Code" style="font-family:var(--mono);font-size:11px">&lt;/&gt;</button>
      <button class="rte-btn" onclick="rteHighlight('${id}')" title="Highlight">🖊</button>
      <div class="rte-sep"></div>
      <button class="rte-btn" onclick="rteCmd('insertUnorderedList')" title="Bullets">• ≡</button>
      <button class="rte-btn" onclick="rteCmd('insertOrderedList')" title="Numbers">1 ≡</button>
      <div class="rte-sep"></div>
      <button class="rte-btn" onclick="rteCmd('formatBlock','blockquote')" title="Quote" style="font-size:15px">"</button>
      <button class="rte-btn" onclick="rteCmd('insertHorizontalRule')" title="Divider" style="font-size:14px">—</button>
      <div class="rte-sep"></div>
      <button class="rte-btn" onclick="rteCmd('justifyLeft')" title="Left">⫷</button>
      <button class="rte-btn" onclick="rteCmd('justifyCenter')" title="Center">≡</button>
      <button class="rte-btn" onclick="rteCmd('justifyRight')" title="Right">⫸</button>
      <div class="rte-sep"></div>
      <button class="rte-btn" onclick="openLinkModal('${id}')" title="Link">🔗</button>
      <button class="rte-btn" onclick="rteCmd('unlink')" title="Unlink">🔗̶</button>
      <div class="rte-sep"></div>
      <button class="rte-btn" onclick="rteCmd('removeFormat')" title="Clear fmt" style="font-size:11px">✕f</button>
    </div>
    <div class="rte-body" id="rte-body-${id}" contenteditable="true" data-placeholder="${placeholder}" oninput="rteSync('${id}')" onkeydown="rteKeydown(event,'${id}')">${content}</div>
    <input type="hidden" id="rte-val-${id}">
  </div>`;
}
function rteCmd(cmd,val=null){document.execCommand(cmd,false,val);}
function rteBlock(tag,id){document.execCommand('formatBlock',false,tag);const b=document.getElementById('rte-body-'+id);if(b)b.focus();}
function rteInlineCode(id){const sel=window.getSelection();if(!sel||sel.isCollapsed)return;const range=sel.getRangeAt(0);const code=document.createElement('code');try{range.surroundContents(code);}catch(e){document.execCommand('insertHTML',false,`<code>${sel.toString()}</code>`);}rteSync(id);}
function rteHighlight(id){const sel=window.getSelection();if(!sel||sel.isCollapsed)return;document.execCommand('insertHTML',false,`<mark>${sel.toString()}</mark>`);rteSync(id);}
function rteSync(id){const b=document.getElementById('rte-body-'+id);const i=document.getElementById('rte-val-'+id);if(b&&i)i.value=b.innerHTML;}
function rteGet(id){const b=document.getElementById('rte-body-'+id);return b?b.innerHTML:'';}
function rteKeydown(e,id){if(e.key==='Tab'){e.preventDefault();document.execCommand(e.shiftKey?'outdent':'indent');rteSync(id);}if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openLinkModal(id);}}
let _activeLinkEditor=null;
function openLinkModal(id){_activeLinkEditor=id;const b=document.getElementById('rte-body-'+id);if(b)b.focus();const sel=window.getSelection();if(sel&&sel.rangeCount>0)_savedRange=sel.getRangeAt(0).cloneRange();const st=sel?sel.toString():'';document.getElementById('lm-text').value=st;document.getElementById('lm-url').value='';document.getElementById('link-modal').classList.add('open');setTimeout(()=>document.getElementById('lm-url').focus(),50);}
function closeLinkModal(){document.getElementById('link-modal').classList.remove('open');_savedRange=null;_activeLinkEditor=null;}
function insertLink(){const text=document.getElementById('lm-text').value.trim(),url=document.getElementById('lm-url').value.trim();if(!url){closeLinkModal();return;}const b=document.getElementById('rte-body-'+_activeLinkEditor);if(b){b.focus();if(_savedRange){const sel=window.getSelection();sel.removeAllRanges();sel.addRange(_savedRange);}document.execCommand('insertHTML',false,`<a href="${url}" target="_blank">${text||url}</a>`);rteSync(_activeLinkEditor);}closeLinkModal();}

// UTILS
// ══════════════════════════════════════════════════════════
function fd(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'2-digit'});}
function fdf(iso){if(!iso)return'—';const d=new Date(iso);return d.toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'})+' '+d.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'});}
let nt;
function notify(msg,icon='✓'){const el=document.getElementById('notif');el.innerHTML=`${icon} ${msg}`;el.classList.add('show');clearTimeout(nt);nt=setTimeout(()=>el.classList.remove('show'),2500);}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeM();closeD();}});

render();
</script>

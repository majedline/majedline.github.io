<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f5f7;--surface:#fff;--surface2:#f0f0f4;--surface3:#e8e8ee;
  --border:#e0e0e8;--border2:#c8c8d8;
  --accent:#5b53f0;--accent2:#7c74ff;--accent-bg:rgba(91,83,240,.07);
  --green:#16a34a;--yellow:#d97706;--red:#dc2626;--cyan:#0891b2;--pink:#db2777;
  --text:#111118;--text2:#555568;--text3:#9090a8;
  --shadow:0 1px 4px rgba(0,0,0,.08);--shadow-lg:0 8px 24px rgba(0,0,0,.12);
  --mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif;
}
[data-theme="dark"]{
  --bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--surface3:#222230;
  --border:#2a2a3a;--border2:#3a3a50;
  --accent:#7c74ff;--accent2:#a78bfa;--accent-bg:rgba(124,116,255,.08);
  --green:#22c55e;--yellow:#f59e0b;--red:#f87171;--cyan:#22d3ee;--pink:#f472b6;
  --text:#e8e8f0;--text2:#9090a8;--text3:#5a5a70;
  --shadow:0 1px 4px rgba(0,0,0,.3);--shadow-lg:0 8px 24px rgba(0,0,0,.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;overflow:hidden;transition:background .25s,color .25s}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}

/* SIDEBAR */
.sidebar{width:224px;min-width:224px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh}
.sidebar-logo{padding:12px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
.logo-block{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.logo-img{width:40px;height:40px;border-radius:8px;object-fit:contain;flex-shrink:0}
.brand{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent);letter-spacing:1px;line-height:1.2}
.tagline{font-size:9px;color:var(--text3);margin-top:2px;font-family:var(--sans);font-weight:400}
.theme-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text2);transition:all .15s;flex-shrink:0}
.theme-btn:hover{background:var(--surface3);color:var(--text)}
.sidebar-nav{padding:8px 0;flex:1;overflow-y:auto}
.nav-label{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:2px;padding:10px 18px 3px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 18px;cursor:pointer;border:none;background:none;color:var(--text2);font-family:var(--sans);font-size:13px;width:100%;text-align:left;border-left:2px solid transparent;transition:all .15s}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{color:var(--accent);background:var(--accent-bg);border-left-color:var(--accent);font-weight:500}
.nav-item .ico{font-size:13px;width:16px;text-align:center}
.badge{margin-left:auto;background:var(--surface3);color:var(--text3);font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:3px}
.sidebar-footer{padding:10px 18px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);font-family:var(--mono);display:flex;align-items:center;justify-content:space-between;gap:6px}
.sb-user{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
.sb-admin-badge{font-family:var(--mono);font-size:8px;background:var(--accent-bg);color:var(--accent);padding:1px 5px;border-radius:3px;border:1px solid var(--accent);letter-spacing:.5px}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.page-head{padding:18px 28px 14px;display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--surface);gap:16px}
.page-head-left{flex:1}
.page-title{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--text)}
.page-sub{font-size:11px;color:var(--text3);margin-top:2px}
.page-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:20px 28px 28px}

/* BUTTONS */
.btn{font-family:var(--sans);font-size:12px;font-weight:500;padding:7px 14px;border-radius:7px;border:none;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 1px 3px rgba(91,83,240,.3)}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover{opacity:.9}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--border)}
.btn-danger:hover{background:rgba(220,38,38,.08);border-color:var(--red)}
.btn-sm{padding:4px 9px;font-size:11px;border-radius:5px}
.btn-icon{padding:5px;width:28px;height:28px;justify-content:center;border-radius:6px}
.view-toggle{display:flex;gap:2px;background:var(--surface2);border-radius:7px;padding:2px}
.view-toggle button{border:none;background:none;cursor:pointer;padding:5px 10px;border-radius:5px;font-size:11px;color:var(--text2);font-family:var(--sans);transition:all .15s}
.view-toggle button.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}

/* FILTER BAR */
.filter-bar{display:flex;flex-wrap:wrap;gap:6px;padding:0 0 16px;align-items:center}
.filter-bar-label{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-right:4px;white-space:nowrap}
.filter-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-family:var(--sans);font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);transition:all .15s;user-select:none;white-space:nowrap}
.filter-chip:hover{border-color:var(--border2);color:var(--text);background:var(--surface2)}
.filter-chip.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);font-weight:600}
.filter-sep{width:1px;height:18px;background:var(--border);margin:0 4px;flex-shrink:0}
.filter-clear{font-size:10px;font-family:var(--mono);color:var(--text3);cursor:pointer;padding:4px 8px;border-radius:4px;border:none;background:none;transition:color .15s}
.filter-clear:hover{color:var(--accent)}

/* QUICK ENTRY */
.quick-entry{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:18px;display:flex;gap:10px;align-items:center;box-shadow:var(--shadow)}
.quick-entry input{flex:1;border:none;background:transparent;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;min-width:0}
.quick-entry input::placeholder{color:var(--text3)}
.quick-entry-sep{width:1px;height:20px;background:var(--border);flex-shrink:0}
.quick-entry select{border:none;background:transparent;color:var(--text2);font-family:var(--sans);font-size:12px;outline:none;cursor:pointer;padding:2px 4px}
.quick-entry select option{background:var(--surface)}

/* TABLES */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:18px;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse}
thead th{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;color:var(--text3);padding:9px 14px;text-align:left;background:var(--surface2);border-bottom:1px solid var(--border);text-transform:uppercase;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
tbody td{padding:10px 14px;font-size:13px;color:var(--text);vertical-align:middle}
.row-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s}
tbody tr:hover .row-actions{opacity:1}

/* TAGS */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-family:var(--mono);font-weight:700;white-space:nowrap}
[data-theme="light"] .tag-backlog{background:#f0f0f5;color:#666}
[data-theme="light"] .tag-sprint{background:#e0f5fa;color:#0891b2}
[data-theme="light"] .tag-dev{background:#fef3c7;color:#d97706}
[data-theme="light"] .tag-test{background:#ede9fe;color:#7c3aed}
[data-theme="light"] .tag-readyprod{background:#dcfce7;color:#15803d}
[data-theme="light"] .tag-production{background:#bbf7d0;color:#16a34a}
[data-theme="light"] .tag-archived{background:#f3f4f6;color:#9ca3af}
[data-theme="light"] .tag-blue{background:#dbeafe;color:#1d4ed8}
[data-theme="light"] .tag-deployed{background:#d1fae5;color:#065f46}
[data-theme="dark"] .tag-backlog{background:rgba(90,90,112,.3);color:#9090a8}
[data-theme="dark"] .tag-sprint{background:rgba(34,211,238,.12);color:#22d3ee}
[data-theme="dark"] .tag-dev{background:rgba(245,158,11,.12);color:#f59e0b}
[data-theme="dark"] .tag-test{background:rgba(167,139,250,.12);color:#a78bfa}
[data-theme="dark"] .tag-readyprod{background:rgba(34,197,94,.12);color:#4ade80}
[data-theme="dark"] .tag-production{background:rgba(34,197,94,.2);color:#22c55e}
[data-theme="dark"] .tag-archived{background:rgba(80,80,80,.3);color:#555}
[data-theme="dark"] .tag-blue{background:rgba(96,165,250,.15);color:#93c5fd}
[data-theme="dark"] .tag-deployed{background:rgba(52,211,153,.2);color:#34d399}

.type-badge{font-family:var(--mono);font-size:9px;letter-spacing:1px;padding:2px 6px;border-radius:3px;font-weight:700;text-transform:uppercase}
[data-theme="light"] .tb-app{background:#fce7f3;color:#db2777;border:1px solid #fbcfe8}
[data-theme="light"] .tb-feat{background:#ede9fe;color:#7c3aed;border:1px solid #ddd6fe}
[data-theme="light"] .tb-epic{background:#fef3c7;color:#b45309;border:1px solid #fde68a}
[data-theme="light"] .tb-ticket{background:#e0f5fa;color:#0891b2;border:1px solid #bae6fd}
[data-theme="light"] .tb-release{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
[data-theme="light"] .tb-sprint{background:#fdf4ff;color:#7e22ce;border:1px solid #e9d5ff}
[data-theme="dark"] .tb-app{background:rgba(244,114,182,.15);color:#f472b6;border:1px solid rgba(244,114,182,.2)}
[data-theme="dark"] .tb-feat{background:rgba(167,139,250,.15);color:#a78bfa;border:1px solid rgba(167,139,250,.2)}
[data-theme="dark"] .tb-epic{background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
[data-theme="dark"] .tb-ticket{background:rgba(34,211,238,.12);color:#22d3ee;border:1px solid rgba(34,211,238,.2)}
[data-theme="dark"] .tb-release{background:rgba(52,211,153,.12);color:#34d399;border:1px solid rgba(52,211,153,.2)}
[data-theme="dark"] .tb-sprint{background:rgba(192,132,252,.12);color:#c084fc;border:1px solid rgba(192,132,252,.2)}

/* PRIORITY / TICKET TYPE */
.priority{display:inline-flex;align-items:center;gap:3px;font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;white-space:nowrap}
.p-critical{background:rgba(220,38,38,.1);color:var(--red)}
.p-high{background:rgba(249,115,22,.1);color:#ea580c}
.p-medium{background:rgba(234,179,8,.1);color:#ca8a04}
.p-low{background:rgba(34,197,94,.1);color:var(--green)}
[data-theme="dark"] .p-critical{background:rgba(248,113,113,.15);color:#fca5a5}
[data-theme="dark"] .p-high{background:rgba(251,146,60,.15);color:#fdba74}
[data-theme="dark"] .p-medium{background:rgba(253,224,71,.1);color:#fde047}
[data-theme="dark"] .p-low{background:rgba(74,222,128,.1);color:#4ade80}
.ttype{display:inline-flex;align-items:center;gap:3px;font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px}
.tt-story{background:rgba(91,83,240,.1);color:var(--accent)}
.tt-bug{background:rgba(220,38,38,.1);color:var(--red)}
.tt-spike{background:rgba(6,182,212,.1);color:var(--cyan)}
[data-theme="dark"] .tt-story{background:rgba(124,116,255,.15);color:#a78bfa}
[data-theme="dark"] .tt-bug{background:rgba(248,113,113,.15);color:#fca5a5}
[data-theme="dark"] .tt-spike{background:rgba(34,211,238,.12);color:#22d3ee}

/* AVATAR */
.avatar{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;font-family:var(--mono);flex-shrink:0;color:#fff;text-transform:uppercase}
.avatar-sm{width:20px;height:20px;font-size:8px}
.avatar-lg{width:34px;height:34px;font-size:12px}
.user-pill{display:inline-flex;align-items:center;gap:5px;padding:2px 8px 2px 3px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);font-size:11px;color:var(--text2);white-space:nowrap}

/* STATUS / PRIORITY CHIPS (form) */
.chip-group{display:flex;flex-wrap:wrap;gap:6px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-family:var(--mono);font-size:10px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:all .18s;user-select:none;opacity:.4}
.chip:hover{opacity:.75;transform:translateY(-1px)}
.chip.selected{opacity:1;transform:translateY(-1px);box-shadow:0 2px 10px rgba(0,0,0,.15)}
.chip-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
[data-theme="light"] .chip-backlog{background:#f0f0f5;color:#666}
[data-theme="light"] .chip-sprint{background:#e0f5fa;color:#0891b2}
[data-theme="light"] .chip-dev{background:#fef3c7;color:#d97706}
[data-theme="light"] .chip-test{background:#ede9fe;color:#7c3aed}
[data-theme="light"] .chip-readyprod{background:#dcfce7;color:#15803d}
[data-theme="light"] .chip-production{background:#bbf7d0;color:#16a34a}
[data-theme="dark"] .chip-backlog{background:rgba(90,90,112,.2);color:#9090a8}
[data-theme="dark"] .chip-sprint{background:rgba(34,211,238,.1);color:#22d3ee}
[data-theme="dark"] .chip-dev{background:rgba(245,158,11,.1);color:#f59e0b}
[data-theme="dark"] .chip-test{background:rgba(167,139,250,.1);color:#a78bfa}
[data-theme="dark"] .chip-readyprod{background:rgba(34,197,94,.1);color:#4ade80}
[data-theme="dark"] .chip-production{background:rgba(34,197,94,.18);color:#22c55e}
.chip-backlog.selected{border-color:#9090a8}
.chip-sprint.selected{border-color:var(--cyan)}
.chip-dev.selected{border-color:var(--yellow)}
.chip-test.selected{border-color:#a78bfa}
.chip-readyprod.selected{border-color:var(--green)}
.chip-production.selected{border-color:var(--green)}
/* priority chips */
.chip-critical{background:rgba(220,38,38,.08);color:var(--red)}.chip-critical.selected{border-color:var(--red)}
.chip-high{background:rgba(249,115,22,.08);color:#ea580c}.chip-high.selected{border-color:#ea580c}
.chip-medium{background:rgba(234,179,8,.08);color:#ca8a04}.chip-medium.selected{border-color:#ca8a04}
.chip-low{background:rgba(34,197,94,.08);color:var(--green)}.chip-low.selected{border-color:var(--green)}
[data-theme="dark"] .chip-critical{background:rgba(248,113,113,.12);color:#fca5a5}
[data-theme="dark"] .chip-high{background:rgba(251,146,60,.12);color:#fdba74}
[data-theme="dark"] .chip-medium{background:rgba(253,224,71,.08);color:#fde047}
[data-theme="dark"] .chip-low{background:rgba(74,222,128,.08);color:#4ade80}
/* ticket type chips */
.chip-story{background:rgba(91,83,240,.08);color:var(--accent)}.chip-story.selected{border-color:var(--accent)}
.chip-bug{background:rgba(220,38,38,.08);color:var(--red)}.chip-bug.selected{border-color:var(--red)}
.chip-spike{background:rgba(6,182,212,.08);color:var(--cyan)}.chip-spike.selected{border-color:var(--cyan)}
[data-theme="dark"] .chip-story{background:rgba(124,116,255,.12);color:#a78bfa}
[data-theme="dark"] .chip-bug{background:rgba(248,113,113,.12);color:#fca5a5}
[data-theme="dark"] .chip-spike{background:rgba(34,211,238,.1);color:#22d3ee}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:820px;max-height:92vh;overflow-y:auto;transform:translateY(12px);transition:transform .2s;box-shadow:var(--shadow-lg)}
.overlay.open .modal{transform:translateY(0)}
.modal-head{padding:20px 26px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:16px;position:sticky;top:0;background:var(--surface);z-index:2}
.modal-title-block{flex:1}
.modal-title{font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:.5px}
.modal-id-trail{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;min-height:16px}
.modal-id-trail .trail-arrow{color:var(--text3);font-size:8px}
.modal-id-crumb{background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:1px 6px;font-size:9px;color:var(--text3);font-family:var(--mono)}
.modal-body{padding:22px 26px}
.modal-foot{padding:14px 26px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--surface);z-index:2}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{margin-bottom:16px}
.fl{display:block;font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:7px}
.fi,.fs{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--sans);font-size:13px;padding:9px 12px;outline:none;transition:border-color .15s}
.fi:focus,.fs:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.fs option{background:var(--surface);color:var(--text)}
.fd-hint{font-size:10px;color:var(--text3);margin-top:4px;font-family:var(--mono)}
.form-section{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;padding:6px 0 12px;border-bottom:1px solid var(--border);margin-bottom:16px}
.checkbox-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);cursor:pointer;padding:4px 0}
.checkbox-row input{width:16px;height:16px;cursor:pointer;accent-color:var(--accent)}

/* DRAWER — 50% width */
.d-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:900;opacity:0;pointer-events:none;transition:opacity .2s}
.d-overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;right:-52%;top:0;width:50%;min-width:420px;height:100vh;background:var(--surface);border-left:1px solid var(--border2);z-index:950;overflow-y:auto;transition:right .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:var(--shadow-lg)}
.drawer.open{right:0}
.d-head{padding:18px 22px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;flex-shrink:0}
.d-body{padding:16px 22px;flex:1}
.d-title{font-size:15px;font-weight:600}
.d-sub{font-size:10px;color:var(--text3);margin-top:3px;font-family:var(--mono)}
.d-actions{display:flex;gap:6px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.irow{display:flex;align-items:flex-start;gap:12px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.irow:last-child{border-bottom:none}
.ilabel{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:1.5px;width:96px;flex-shrink:0;text-transform:uppercase;padding-top:2px}

/* HISTORY */
.hist{background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-top:8px;max-height:200px;overflow-y:auto}
.hi{padding:8px 12px;border-bottom:1px solid var(--border);font-size:11px;display:flex;gap:10px}
.hi:last-child{border-bottom:none}
.ht{font-family:var(--mono);font-size:9px;color:var(--text3);white-space:nowrap;flex-shrink:0;padding-top:1px}
.hd{color:var(--text2);line-height:1.5}
.hf{color:var(--accent);font-weight:500}

/* TABS */
.tabs{display:flex;gap:2px;margin-bottom:16px}
.tab{padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;border:none;background:none;color:var(--text3);font-family:var(--sans);font-weight:500;transition:all .15s}
.tab:hover{background:var(--surface2);color:var(--text)}
.tab.active{background:var(--surface);color:var(--text);border:1px solid var(--border2);box-shadow:var(--shadow)}

/* MISC */
.id-chip{font-family:var(--mono);font-size:10px;color:var(--text3);background:var(--surface2);padding:1px 5px;border-radius:3px}
.empty{text-align:center;padding:44px 20px;color:var(--text3)}
.empty .ico{font-size:28px;margin-bottom:10px}
.empty p{font-size:13px}
.archived-row td{opacity:.4}
.notif{position:fixed;bottom:22px;right:22px;background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:11px 16px;font-size:13px;color:var(--text);z-index:2000;transform:translateY(16px);opacity:0;transition:all .25s;max-width:300px;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow-lg)}
.notif.show{transform:translateY(0);opacity:1}
.section-label{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.drag-handle{cursor:grab;color:var(--text3);padding:0 6px 0 0;font-size:14px;line-height:1;user-select:none;opacity:.4;transition:opacity .15s;flex-shrink:0}
.drag-handle:active{cursor:grabbing}
tbody tr:hover .drag-handle{opacity:.8}
.order-num{font-family:var(--mono);font-size:10px;color:var(--text3);min-width:22px;text-align:right}
tr.drag-over{background:var(--accent-bg)!important;outline:2px dashed var(--accent);outline-offset:-2px}
tr.dragging{opacity:.35;background:var(--surface3)!important}

/* SPRINT / SWIMLANE */
.sprint-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:18px;box-shadow:var(--shadow)}
.sprint-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:12px}
.sprint-name{font-family:var(--mono);font-size:13px;font-weight:700}
.sprint-meta{font-size:11px;color:var(--text3);display:flex;gap:12px;align-items:center}
.sprint-date{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
.sprint-progress{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;flex:1;max-width:120px}
.sprint-progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .5s}
.swimlane-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;min-height:120px}
.swim-col{background:var(--surface2);border-radius:8px;padding:10px;min-height:100px}
.swim-col-title{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.swim-card{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:9px 10px;margin-bottom:7px;cursor:pointer;transition:all .15s;font-size:12px}
.swim-card:hover{border-color:var(--accent);box-shadow:var(--shadow);transform:translateY(-1px)}
.swim-card:last-child{margin-bottom:0}
.swim-card-title{font-weight:500;margin-bottom:4px;line-height:1.3}
.swim-card-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.sprint-objective{background:var(--accent-bg);border:1px solid var(--accent);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--text2)}
.sprint-picker{background:var(--surface2);border:1px solid var(--border);border-radius:8px;max-height:260px;overflow-y:auto;margin-top:8px}
.sprint-picker-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;font-size:13px}
.sprint-picker-row:last-child{border-bottom:none}
.sprint-picker-row:hover{background:var(--accent-bg)}
.sprint-picker-row input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--accent);flex-shrink:0}
.sprint-objective strong{color:var(--text);font-weight:600}

/* RELEASE */
.release-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow);cursor:pointer;transition:border-color .15s}
.release-card:hover{border-color:var(--accent)}
.release-card.deployed{border-left:4px solid var(--green)}
.release-card-header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px}
.release-title{font-family:var(--mono);font-size:13px;font-weight:700}
.release-stats{display:flex;gap:10px;font-size:11px;color:var(--text3)}
.release-summary-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;font-size:12px;line-height:1.7;font-family:var(--mono);white-space:pre-wrap;word-break:break-word;max-height:320px;overflow-y:auto;color:var(--text2)}

/* USERS */
.users-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;margin-bottom:18px}
.user-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);cursor:pointer;transition:border-color .15s}
.user-card:hover{border-color:var(--accent)}
.user-info{flex:1}
.user-name{font-size:14px;font-weight:600}
.user-role{font-size:11px;color:var(--text3);margin-top:2px}
.user-stats{display:flex;gap:10px;font-size:11px;color:var(--text3);margin-top:5px}
.user-stat-item{font-family:var(--mono);font-size:10px}

/* REPORTS */
.r-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sc::before{background:var(--cyan)}.sy::before{background:var(--yellow)}.sg::before{background:var(--green)}
.sp::before{background:var(--pink)}.sv::before{background:var(--accent)}.sr::before{background:var(--red)}
.stat-num{font-family:var(--mono);font-size:28px;font-weight:700;line-height:1;margin-bottom:3px}
.stat-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--text3);text-transform:uppercase}
.stat-sub{font-size:11px;color:var(--text2);margin-top:4px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.rc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;box-shadow:var(--shadow);margin-bottom:0}
.rc.mb{margin-bottom:20px}
.rct{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:12px}
.brow{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.brow:last-child{margin-bottom:0}
.blabel{font-family:var(--mono);font-size:9px;color:var(--text2);width:96px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btrack{flex:1;height:7px;background:var(--surface2);border-radius:3px;overflow:hidden}
.bfill{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.bcount{font-family:var(--mono);font-size:10px;color:var(--text3);width:24px;text-align:right;flex-shrink:0}
.pip-steps{display:flex;margin-bottom:12px}
.pip-step{flex:1;text-align:center;position:relative}
.pip-step::after{content:'';position:absolute;top:12px;left:50%;width:100%;height:2px;background:var(--border);z-index:0}
.pip-step:last-child::after{display:none}
.pip-dot{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;margin:0 auto 5px;position:relative;z-index:1;font-family:var(--mono);font-size:9px;font-weight:700;transition:all .3s}
.pip-dot.on{background:var(--surface)}
.pip-name{font-family:var(--mono);font-size:8px;color:var(--text3);line-height:1.4}
.dnut-wrap{display:flex;align-items:center;gap:16px}
.dnut-leg{flex:1}
.dnut-li{display:flex;align-items:center;gap:7px;margin-bottom:6px;font-size:11px;color:var(--text2)}
.dnut-li:last-child{margin-bottom:0}
.dnut-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.dnut-val{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text3)}
.workload-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.workload-row:last-child{margin-bottom:0}
.workload-user{display:flex;align-items:center;gap:6px;width:118px;flex-shrink:0}
.workload-name{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.workload-bars{flex:1;display:flex;gap:3px}
.workload-seg{height:8px;border-radius:2px;transition:width .6s}

/* CONFIG */
.config-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:18px;box-shadow:var(--shadow)}
.config-section-title{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--text);margin-bottom:14px;letter-spacing:.5px}
.role-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.role-row:last-child{border-bottom:none}

/* RICH TEXT EDITOR */
.rte-wrap{border:1px solid var(--border);border-radius:7px;background:var(--surface2);transition:border-color .15s,box-shadow .15s;overflow:hidden}
.rte-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.rte-toolbar{display:flex;flex-wrap:wrap;gap:2px;padding:5px 7px;border-bottom:1px solid var(--border);background:var(--surface);align-items:center}
.rte-btn{width:26px;height:26px;border:none;background:none;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text2);transition:all .12s;flex-shrink:0}
.rte-btn:hover{background:var(--surface2);color:var(--text)}
.rte-sep{width:1px;height:18px;background:var(--border);margin:0 2px;flex-shrink:0}
.rte-select{border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:var(--sans);font-size:11px;border-radius:5px;padding:2px 6px;outline:none;cursor:pointer;height:26px}
.rte-body{min-height:110px;max-height:280px;overflow-y:auto;padding:9px 12px;font-family:var(--sans);font-size:13px;color:var(--text);line-height:1.6;outline:none;background:var(--surface2)}
.rte-body:empty:before{content:attr(data-placeholder);color:var(--text3);pointer-events:none}
.rte-body h1{font-size:1.4em;font-weight:700;margin:0 0 6px}
.rte-body h2{font-size:1.2em;font-weight:600;margin:0 0 5px}
.rte-body h3{font-size:1.05em;font-weight:600;margin:0 0 4px}
.rte-body p{margin:0 0 5px}.rte-body p:last-child{margin:0}
.rte-body ul,.rte-body ol{padding-left:20px;margin:0 0 5px}
.rte-body blockquote{border-left:3px solid var(--accent);margin:5px 0;padding:4px 10px;color:var(--text2);font-style:italic;background:var(--accent-bg);border-radius:0 4px 4px 0}
.rte-body code{font-family:var(--mono);font-size:11px;background:var(--surface3);border:1px solid var(--border);padding:1px 5px;border-radius:3px}
.rte-body pre{font-family:var(--mono);font-size:11px;background:var(--surface3);border:1px solid var(--border);padding:9px 12px;border-radius:6px;overflow-x:auto;margin:5px 0;white-space:pre-wrap}
.rte-body a{color:var(--accent);text-decoration:underline}
.rte-body mark{background:rgba(245,158,11,.25);padding:1px 2px;border-radius:2px}
.rich-content{font-size:13px;color:var(--text2);line-height:1.6}
.rich-content h1{font-size:1.3em;font-weight:700;color:var(--text)}
.rich-content h2{font-size:1.15em;font-weight:600;color:var(--text)}
.rich-content h3{font-size:1.05em;font-weight:600;color:var(--text)}
.rich-content ul,.rich-content ol{padding-left:18px}
.rich-content blockquote{border-left:3px solid var(--accent);padding:3px 10px;color:var(--text2);background:var(--accent-bg);border-radius:0 4px 4px 0;font-style:italic}
.rich-content code{font-family:var(--mono);font-size:11px;background:var(--surface3);padding:1px 4px;border-radius:3px}
.rich-content pre{font-family:var(--mono);font-size:11px;background:var(--surface3);padding:8px 10px;border-radius:5px;overflow-x:auto}
.rich-content a{color:var(--accent)}
.rich-content mark{background:rgba(245,158,11,.25);padding:1px 2px;border-radius:2px}
.link-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .15s}
.link-modal.open{opacity:1;pointer-events:all}
.link-modal-box{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:18px;width:320px;box-shadow:var(--shadow-lg)}
/* HELP PAGE */
.help-hero{background:var(--accent-bg);border:1px solid var(--accent);border-radius:14px;padding:24px 28px;margin-bottom:24px}
.help-hero-title{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--accent);margin-bottom:6px}
.help-hero-sub{font-size:14px;color:var(--text2);line-height:1.6;max-width:680px}
.help-toc{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px}
.help-toc-chip{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:20px;font-size:12px;font-family:var(--sans);font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);transition:all .15s;text-decoration:none}
.help-toc-chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.help-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px 26px;margin-bottom:18px;box-shadow:var(--shadow)}
.help-section-title{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:10px}
.help-section-ico{font-size:18px}
.help-section-sub{font-size:12px;color:var(--text3);margin-bottom:16px;font-family:var(--mono);letter-spacing:.3px}
.help-body{font-size:13px;color:var(--text2);line-height:1.75}
.help-body p{margin-bottom:10px}
.help-body p:last-child{margin-bottom:0}
.help-body strong{color:var(--text);font-weight:600}
.help-body ul{padding-left:18px;margin-bottom:10px}
.help-body li{margin-bottom:4px}
.help-body ol{padding-left:18px;margin-bottom:10px}
.help-tip{background:var(--surface2);border-left:3px solid var(--accent);border-radius:0 7px 7px 0;padding:10px 14px;margin:12px 0;font-size:12px;color:var(--text2)}
.help-tip strong{color:var(--accent)}
.help-kbd{display:inline-flex;align-items:center;font-family:var(--mono);font-size:10px;background:var(--surface3);border:1px solid var(--border2);border-radius:4px;padding:1px 6px;color:var(--text2);white-space:nowrap}
.help-flow{display:flex;align-items:flex-start;gap:0;margin:16px 0;flex-wrap:wrap}
.help-flow-step{display:flex;flex-direction:column;align-items:center;flex:1;min-width:100px;max-width:140px;position:relative}
.help-flow-step::after{content:'→';position:absolute;right:-12px;top:22px;font-size:16px;color:var(--text3)}
.help-flow-step:last-child::after{display:none}
.help-flow-badge{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:8px;flex-shrink:0}
.help-flow-label{font-family:var(--mono);font-size:9px;letter-spacing:1px;color:var(--text);font-weight:700;text-align:center;text-transform:uppercase}
.help-flow-desc{font-size:10px;color:var(--text3);text-align:center;margin-top:3px;line-height:1.4}
.help-divider{height:1px;background:var(--border);margin:20px 0}
.help-tag-demo{display:inline-flex;align-items:center;gap:8px;flex-wrap:wrap;margin:6px 0}
.help-2col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:10px 0}
.help-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.help-card-title{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--text);margin-bottom:5px;letter-spacing:.5px}
.help-card-body{font-size:12px;color:var(--text2);line-height:1.6}
</style>

    <div style="margin-bottom:14px"><label class="fl">URL</label><input class="fi" id="lm-url" placeholder="https://…" onkeydown="if(event.key==='Enter')insertLink()"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-ghost btn-sm" onclick="closeLinkModal()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="insertLink()">Insert</button>
    </div>
  </div>
</div>
<div class="notif" id="notif"></div>

<script>
// ══════════════════════════════════════════════════════════
// THEME
// ══════════════════════════════════════════════════════════
let darkMode = localStorage.getItem('px_dark') === '1';
function applyTheme() {
  document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
  document.getElementById('themeBtn').textContent = darkMode ? '☀️' : '🌙';
  localStorage.setItem('px_dark', darkMode ? '1' : '0');
}
function toggleTheme() { darkMode = !darkMode; applyTheme(); }
applyTheme();

// ══════════════════════════════════════════════════════════
// DATA LAYER
// ══════════════════════════════════════════════════════════
const DB = {
  get(k) { try { return JSON.parse(localStorage.getItem('px_'+k)||'null'); } catch { return null; } },
  set(k,v) { localStorage.setItem('px_'+k, JSON.stringify(v)); }
};
function load(k, d=[]) { return DB.get(k) ?? d; }
function save(k,v) { DB.set(k,v); badges(); }

let apps     = load('apps');
let feats    = load('feats');
let epics    = load('epics');
let tix      = load('tix');
let users    = load('users');
let sprints  = load('sprints');
let releases = load('releases');
let roles    = load('roles', [
  {id:'ROLE-0001',name:'Admin',system:true},
  {id:'ROLE-0002',name:'Product Manager',system:false},
  {id:'ROLE-0003',name:'Developer',system:false},
  {id:'ROLE-0004',name:'QA Engineer',system:false},
  {id:'ROLE-0005',name:'Designer',system:false},
  {id:'ROLE-0006',name:'Scrum Master',system:false},
]);
if (!DB.get('roles')) save('roles', roles);

// Seed users if empty
if (!users.length) {
  users = [
    {id:'USR-0001',name:'Alex Rivera',  initials:'AR',color:'#6366f1',roleId:'ROLE-0003',appIds:[],isAdmin:false,createdAt:new Date().toISOString()},
    {id:'USR-0002',name:'Sam Chen',     initials:'SC',color:'#0891b2',roleId:'ROLE-0003',appIds:[],isAdmin:false,createdAt:new Date().toISOString()},
    {id:'USR-0003',name:'Jordan Blake', initials:'JB',color:'#16a34a',roleId:'ROLE-0002',appIds:[],isAdmin:true, createdAt:new Date().toISOString()},
    {id:'USR-0004',name:'Taylor Morgan',initials:'TM',color:'#d97706',roleId:'ROLE-0004',appIds:[],isAdmin:false,createdAt:new Date().toISOString()},
  ];
  save('users', users);
}

// Active session user (pick first admin or first user)
let sessionUserId = localStorage.getItem('px_session') || (users.find(u=>u.isAdmin)||users[0])?.id;
function sessionUser() { return users.find(u=>u.id===sessionUserId) || users[0]; }
function isAdmin() { const u=sessionUser(); return u?.isAdmin||false; }

function nid(p) {
  const k='px_s_'+p, n=(parseInt(localStorage.getItem(k)||'0'))+1;
  localStorage.setItem(k,n);
  return p.toUpperCase()+'-'+String(n).padStart(4,'0');
}
function addH(r,a,d='') { if(!r.history) r.history=[]; r.history.unshift({ts:new Date().toISOString(),action:a,details:d,by:sessionUserId||null}); }
function diffFields(o,n,ff) { return ff.filter(f=>o[f]!==n[f]).map(f=>`<span class="hf">${f}</span>: "${o[f]||'—'}"→"${n[f]||'—'}"`).join(', '); }

// ══════════════════════════════════════════════════════════
// PERSISTED FILTERS
// ══════════════════════════════════════════════════════════
const FP = {
  get(v) { return DB.get('px_filter_'+v)||{}; },
  set(v,val) { DB.set('px_filter_'+v,val); }
};

// ══════════════════════════════════════════════════════════
// NAV
// ══════════════════════════════════════════════════════════
let view = 'backlog';
let sprintView = localStorage.getItem('px_sprint_view') || 'list'; // 'list' | 'swimlane'

function go(v) {
  // Config requires admin
  if (v === 'config' && !isAdmin()) { notify('Admin access required','🔒'); return; }
  view = v;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', (el.getAttribute('onclick')||'').includes("'"+v+"'")));
  closeD();
  render();
}

function badges() {
  document.getElementById('bb').textContent  = tix.filter(t=>t.status==='backlog'&&!t.archived).length;
  const activeSprint = sprints.find(s=>s.active);
  document.getElementById('bsp').textContent = activeSprint ? tix.filter(t=>t.sprintId===activeSprint.id&&!t.archived).length : 0;
  document.getElementById('ba').textContent  = apps.filter(a=>!a.archived).length;
  document.getElementById('bf').textContent  = feats.filter(f=>!f.archived).length;
  document.getElementById('be').textContent  = epics.filter(e=>!e.archived).length;
  document.getElementById('bt').textContent  = tix.filter(t=>!t.archived).length;
  document.getElementById('br').textContent  = releases.filter(r=>!r.archived).length;
  document.getElementById('bu').textContent  = users.length;
  // Show/hide config nav based on admin status
  const isAdm = isAdmin();
  document.getElementById('config-nav-label').style.display = isAdm ? '' : 'none';
  document.getElementById('config-nav-item').style.display  = isAdm ? '' : 'none';
  document.getElementById('sb-config-btn').style.display    = isAdm ? '' : 'none';
  // Sidebar user display
  const su = sessionUser();
  if (su) {
    document.getElementById('sb-user-display').innerHTML = `
      <span class="avatar avatar-sm" style="background:${su.color}">${su.initials}</span>
      <span>${su.name}</span>
      ${su.isAdmin?'<span class="sb-admin-badge">ADMIN</span>':''}`;
  }
}

// ══════════════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════════════
const ST = [
  {v:'backlog',    l:'Backlog',       tc:'tag-backlog',    cc:'chip-backlog',    col:'#9ca3af'},
  {v:'sprint',     l:'In Sprint',     tc:'tag-sprint',     cc:'chip-sprint',     col:'#0891b2'},
  {v:'dev',        l:'In Dev',        tc:'tag-dev',        cc:'chip-dev',        col:'#d97706'},
  {v:'test',       l:'In Test',       tc:'tag-test',       cc:'chip-test',       col:'#7c3aed'},
  {v:'readyprod',  l:'Ready for Prod',tc:'tag-readyprod',  cc:'chip-readyprod',  col:'#16a34a'},
  {v:'production', l:'In Production', tc:'tag-production', cc:'chip-production', col:'#15803d'},
];
const PRIORITIES = [
  {v:'critical',l:'Critical',cc:'chip-critical',pc:'p-critical',icon:'🔴'},
  {v:'high',    l:'High',    cc:'chip-high',    pc:'p-high',    icon:'🟠'},
  {v:'medium',  l:'Medium',  cc:'chip-medium',  pc:'p-medium',  icon:'🟡'},
  {v:'low',     l:'Low',     cc:'chip-low',     pc:'p-low',     icon:'🟢'},
];
const TTYPES = [
  {v:'story',l:'Story',cc:'chip-story',tc:'tt-story',icon:'📖'},
  {v:'bug',  l:'Bug',  cc:'chip-bug',  tc:'tt-bug',  icon:'🐛'},
  {v:'spike',l:'Spike',cc:'chip-spike',tc:'tt-spike',icon:'⚡'},
];

function stag(v) { const s=ST.find(x=>x.v===v)||ST[0]; return `<span class="tag ${s.tc}">${s.l}</span>`; }
function ptag(v) { if(!v)return''; const p=PRIORITIES.find(x=>x.v===v); if(!p)return''; return `<span class="priority ${p.pc}">${p.icon} ${p.l}</span>`; }
function tttag(v) { if(!v||v==='story')return''; const t=TTYPES.find(x=>x.v===v); if(!t)return''; return `<span class="ttype ${t.tc}">${t.icon} ${t.l}</span>`; }

function statusChips(cur='backlog') {
  return `<input type="hidden" id="fst" value="${cur}"><div class="chip-group" id="cg">${ST.map(s=>`<div class="chip ${s.cc}${cur===s.v?' selected':''}" onclick="selChip('fst','cg','${s.v}',this)" data-v="${s.v}"><span class="chip-dot"></span>${s.l}</div>`).join('')}</div>`;
}
function priorityChips(cur='medium') {
  return `<input type="hidden" id="fpri" value="${cur}"><div class="chip-group" id="cpri">${PRIORITIES.map(p=>`<div class="chip ${p.cc}${cur===p.v?' selected':''}" onclick="selChip('fpri','cpri','${p.v}',this)" data-v="${p.v}"><span class="chip-dot"></span>${p.l}</div>`).join('')}</div>`;
}
function typeChips(cur='story') {
  return `<input type="hidden" id="ftype" value="${cur}"><div class="chip-group" id="ctype">${TTYPES.map(t=>`<div class="chip ${t.cc}${cur===t.v?' selected':''}" onclick="selChip('ftype','ctype','${t.v}',this)" data-v="${t.v}"><span class="chip-dot"></span>${t.icon} ${t.l}</div>`).join('')}</div>`;
}
function selChip(inputId, groupId, value, el) {
  document.getElementById(inputId).value = value;
  document.querySelectorAll(`#${groupId} .chip`).forEach(c=>c.classList.toggle('selected', c.dataset.v===value));
}

// ══════════════════════════════════════════════════════════
// USER / ROLE HELPERS
// ══════════════════════════════════════════════════════════
function roleLabel(roleId) { return roles.find(r=>r.id===roleId)?.name || '—'; }
function userAvatar(uid, size='') {
  const u=users.find(x=>x.id===uid);
  if (!u) return '<span style="color:var(--text3);font-size:11px">—</span>';
  return `<span class="avatar${size?' avatar-'+size:''}" style="background:${u.color}">${u.initials}</span>`;
}
function userPill(uid) {
  const u=users.find(x=>x.id===uid);
  if (!u) return '—';
  return `<span class="user-pill">${userAvatar(uid)} ${u.name}</span>`;
}
function userOpts(sel='') {
  return `<option value="">— Unassigned —</option>${users.map(u=>`<option value="${u.id}"${u.id===sel?' selected':''}>${u.name}</option>`).join('')}`;
}
function roleOpts(sel='') {
  return `<option value="">— No Role —</option>${roles.map(r=>`<option value="${r.id}"${r.id===sel?' selected':''}>${r.name}</option>`).join('')}`;
}

// ══════════════════════════════════════════════════════════
// BREADCRUMB / DROPDOWN HELPERS
// ══════════════════════════════════════════════════════════
function featBreadcrumb(featId) {
  const f=feats.find(x=>x.id===featId); if(!f) return null;
  const a=apps.find(x=>x.id===f.appId);
  return a ? `${a.title} › ${f.title}` : f.title;
}
function epicBreadcrumb(epicId) {
  const e=epics.find(x=>x.id===epicId); if(!e) return null;
  const fb=featBreadcrumb(e.featId);
  return fb ? `${fb} › ${e.title}` : e.title;
}
function featOpts(sel='') {
  return `<option value="">— No Feature —</option>${feats.filter(f=>!f.archived).map(f=>`<option value="${f.id}"${f.id===sel?' selected':''}>${featBreadcrumb(f.id)||f.title}</option>`).join('')}`;
}
function epicOpts(sel='') {
  return `<option value="">— No Epic —</option>${epics.filter(e=>!e.archived).map(e=>`<option value="${e.id}"${e.id===sel?' selected':''}>${epicBreadcrumb(e.id)||e.title}</option>`).join('')}`;
}
function appOpts(sel='') {
  return `<option value="">— No App —</option>${apps.filter(a=>!a.archived).map(a=>`<option value="${a.id}"${a.id===sel?' selected':''}>${a.title}</option>`).join('')}`;
}
function sprintOpts(sel='') {
  return `<option value="">— No Sprint —</option>${sprints.filter(s=>!s.archived).map(s=>`<option value="${s.id}"${s.id===sel?' selected':''}>${s.name}</option>`).join('')}`;
}
function releaseOpts(sel='') {
  return `<option value="">— No Release —</option>${releases.filter(r=>!r.archived&&!r.deployed).map(r=>`<option value="${r.id}"${r.id===sel?' selected':''}>${r.name}</option>`).join('')}`;
}

// ID trail
function updateTrail(type, record) {
  const el = document.getElementById('m-trail'); if (!el) return;
  const segs = [];
  if (type === 'feature' && record.appId) { const a=apps.find(x=>x.id===record.appId); if(a) segs.push({id:a.id,label:a.title,cls:'tb-app'}); }
  if (type === 'epic' && record.featId) {
    const f=feats.find(x=>x.id===record.featId); if(f){ const a=apps.find(x=>x.id===f.appId); if(a) segs.push({id:a.id,label:a.title,cls:'tb-app'}); segs.push({id:f.id,label:f.title,cls:'tb-feat'}); }
  }
  if (type === 'ticket' && record.epicId) {
    const e=epics.find(x=>x.id===record.epicId); if(e){ if(e.featId){ const f=feats.find(x=>x.id===e.featId); if(f){ const a=apps.find(x=>x.id===f.appId); if(a) segs.push({id:a.id,label:a.title,cls:'tb-app'}); segs.push({id:f.id,label:f.title,cls:'tb-feat'}); } } segs.push({id:e.id,label:e.title,cls:'tb-epic'}); }
  }
  if (!segs.length) { el.innerHTML=''; return; }
  el.innerHTML = segs.map((s,i)=>`${i>0?'<span class="trail-arrow">›</span>':''}<span style="display:inline-flex;align-items:center;gap:4px"><span class="modal-id-crumb">${s.id}</span><span style="font-size:10px;color:var(--text2)">${s.label}</span></span>`).join('');
}

// ══════════════════════════════════════════════════════════
// FILTER BAR
// ══════════════════════════════════════════════════════════
function filterBar(viewKey, groups) {
  const saved = FP.get(viewKey);
  let html = `<div class="filter-bar">`;
  groups.forEach((g,gi) => {
    if (gi>0) html += `<div class="filter-sep"></div>`;
    html += `<span class="filter-bar-label">${g.label}</span>`;
    g.items.forEach(item => {
      const active = (saved[g.key]||[]).includes(item.id);
      html += `<span class="filter-chip${active?' active':''}" onclick="toggleFilter('${viewKey}','${g.key}','${item.id}')">${item.label}</span>`;
    });
  });
  const hasAny = groups.some(g=>(saved[g.key]||[]).length>0);
  if (hasAny) html += `<button class="filter-clear" onclick="clearFilters('${viewKey}')">✕ Clear</button>`;
  return html + '</div>';
}
function toggleFilter(viewKey, key, id) {
  const saved=FP.get(viewKey); const arr=saved[key]||[]; const idx=arr.indexOf(id);
  if(idx>-1) arr.splice(idx,1); else arr.push(id);
  saved[key]=arr; FP.set(viewKey,saved); render();
}
function clearFilters(viewKey) { FP.set(viewKey,{}); render(); }
function applyFilters(rows, viewKey) {
  const saved=FP.get(viewKey); let out=rows;
  if ((saved.appIds||[]).length) out=out.filter(row=>{
    if(row.appId) return saved.appIds.includes(row.appId);
    if(row.featId){const f=feats.find(x=>x.id===row.featId);return f&&saved.appIds.includes(f.appId);}
    if(row.epicId){const e=epics.find(x=>x.id===row.epicId);if(!e)return false;const f=feats.find(x=>x.id===e.featId);return f&&saved.appIds.includes(f.appId);}
    return false;
  });
  if ((saved.featIds||[]).length) out=out.filter(row=>{
    if(row.featId) return saved.featIds.includes(row.featId);
    if(row.epicId){const e=epics.find(x=>x.id===row.epicId);return e&&saved.featIds.includes(e.featId);}
    return false;
  });
  if ((saved.epicIds||[]).length) out=out.filter(row=>row.epicId&&saved.epicIds.includes(row.epicId));
  return out;
}

// ══════════════════════════════════════════════════════════
// RENDER ROUTER
// ══════════════════════════════════════════════════════════
const VIEWS = {
  backlog:  ()=>renderTix('backlog','Backlog','Items awaiting sprint'),
  sprints:  renderSprints,
  apps:     renderApps,
  features: renderFeats,
  feats:    renderFeats,
  epics:    renderEpics,
  tickets:  ()=>renderTix(null,'All Tickets','Every ticket'),
  releases: renderReleases,
  users:    renderUsers,
  reports:  renderReports,
  config:   renderConfig,
  help:     renderHelp,
};
function render() { badges(); const fn=VIEWS[view]; if(fn) fn(); }
function setHead(title,sub,actions='') {
  document.getElementById('ptitle').textContent=title;
  document.getElementById('psub').textContent=sub;
  document.getElementById('pact').innerHTML=actions;
}
function tabsHtml(a,b) {
  return `<div class="tabs"><button class="tab active" id="ta" onclick="swTab('active')">Active (${a})</button><button class="tab" id="tb" onclick="swTab('archived')">Archived (${b})</button></div>`;
}
function swTab(t) {
  ['active','archived'].forEach(x=>{document.getElementById('t'+x[0]).classList.toggle('active',x===t);document.getElementById('tp-'+x).style.display=x===t?'':'none';});
}

// sort helper
function sortByOrder(arr) {
  return [...arr].sort((a,b)=>{
    if(a.sortOrder!=null&&b.sortOrder!=null) return a.sortOrder-b.sortOrder;
    if(a.sortOrder!=null) return -1;
    if(b.sortOrder!=null) return 1;
    return new Date(b.updatedAt||b.createdAt)-new Date(a.updatedAt||a.createdAt);
  });
}

// ══════════════════════════════════════════════════════════
// QUICK ENTRY
// ══════════════════════════════════════════════════════════
function quickEntryHtml(defaultStatus='backlog') {
  const statusOpts=ST.map(s=>`<option value="${s.v}"${s.v===defaultStatus?' selected':''}>${s.l}</option>`).join('');
  const epicOpts2=epics.filter(e=>!e.archived).map(e=>`<option value="${e.id}">${epicBreadcrumb(e.id)||e.title}</option>`).join('');
  const assignOpts=users.map(u=>`<option value="${u.id}">${u.name}</option>`).join('');
  return `<div class="quick-entry">
    <span style="font-size:16px;color:var(--text3)">+</span>
    <input id="qe-title" placeholder="Quick add… press Enter" onkeydown="quickSave(event,'${defaultStatus}')">
    <div class="quick-entry-sep"></div>
    <select id="qe-status">${statusOpts}</select>
    <div class="quick-entry-sep"></div>
    <select id="qe-epic"><option value="">No Epic</option>${epicOpts2}</select>
    <div class="quick-entry-sep"></div>
    <select id="qe-assign"><option value="">Unassigned</option>${assignOpts}</select>
    <button class="btn btn-primary btn-sm" onclick="quickSave(null,'${defaultStatus}')">Add</button>
  </div>`;
}
function quickSave(e,def) {
  if(e&&e.key!=='Enter') return;
  const titleEl=document.getElementById('qe-title'); const title=titleEl?.value.trim();
  if(!title){notify('Enter a title first','⚠');return;}
  const now=new Date().toISOString();
  const activeSprint=sprints.find(s=>s.active);
  const rec={id:nid('TKT'),title,description:'',ticketType:'story',
    status:document.getElementById('qe-status')?.value||def,priority:'medium',
    epicId:document.getElementById('qe-epic')?.value||null,
    assignedTo:document.getElementById('qe-assign')?.value||null,
    createdBy:sessionUserId||null,
    sprintId:def==='sprint'?activeSprint?.id||null:null,
    releaseId:null,sortOrder:tix.length+1,
    createdAt:now,updatedAt:now,archived:false,history:[]};
  addH(rec,'Created',`Quick entry — ${rec.status}`);
  tix.push(rec); save('tix',tix);
  if(titleEl) titleEl.value='';
  notify('Ticket added ⚡'); render();
}

// ══════════════════════════════════════════════════════════
// TICKET TABLE
// ══════════════════════════════════════════════════════════
function renderTix(sf, title, sub) {
  setHead(title, sub, `<button class="btn btn-primary" onclick="openTM()">+ New Ticket</button>`);
  let rows = sf ? tix.filter(t=>t.status===sf) : [...tix];
  rows = sortByOrder(rows);
  const aa=apps.filter(a=>!a.archived), af=feats.filter(f=>!f.archived), ae=epics.filter(e=>!e.archived);
  const fbarHtml = filterBar('tickets',[
    {label:'App',key:'appIds',items:aa.map(a=>({id:a.id,label:a.title}))},
    {label:'Feature',key:'featIds',items:af.map(f=>({id:f.id,label:f.title}))},
    {label:'Epic',key:'epicIds',items:ae.map(e=>({id:e.id,label:e.title}))},
  ]);
  const all=applyFilters(rows,'tickets');
  const act=all.filter(t=>!t.archived), arch=all.filter(t=>t.archived);
  document.getElementById('mc').innerHTML = quickEntryHtml(sf||'backlog') + fbarHtml + tabsHtml(act.length,arch.length) +
    `<div id="tp-active">${tTable(act,0)}</div><div id="tp-archived" style="display:none">${tTable(arch,1)}</div>`;
}
function tTable(rows, isA) {
  if (!rows.length) return `<div class="empty"><div class="ico">◻</div><p>No items yet.</p></div>`;
  const ns=isA?'tarch':'tact';
  return `<div class="table-wrap"><table>
    <thead><tr><th style="width:26px"></th><th style="width:26px;text-align:right">#</th><th>ID</th><th>Type</th><th>Title</th><th>Status</th><th>Priority</th><th>Assigned</th><th>Sprint</th><th>Release</th><th>Updated</th><th></th></tr></thead>
    <tbody id="tbody-${ns}">${rows.map((t,idx)=>`<tr draggable="true" data-id="${t.id}" data-store="tix" class="${isA?'archived-row':''}" onclick="openTD('${t.id}')" ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="drop(event,'tix')" ondragleave="dragLeave(event)" ondragend="dragEnd(event)">
      <td onclick="event.stopPropagation()"><span class="drag-handle">⠿</span></td>
      <td style="text-align:right"><span class="order-num">${t.sortOrder??idx+1}</span></td>
      <td><span class="id-chip">${t.id}</span></td>
      <td>${t.ticketType&&t.ticketType!=='story'?tttag(t.ticketType):tttag('story')}</td>
      <td style="font-weight:500">${t.title}</td>
      <td>${stag(t.status)}</td>
      <td>${t.priority?ptag(t.priority):'—'}</td>
      <td>${t.assignedTo?userPill(t.assignedTo):'<span style="color:var(--text3);font-size:11px">—</span>'}</td>
      <td style="font-size:11px;color:var(--text3)">${t.sprintId?(sprints.find(s=>s.id===t.sprintId)?.name||'—'):'—'}</td>
      <td style="font-size:11px;color:var(--text3)">${t.releaseId?(releases.find(r=>r.id===t.releaseId)?.name||'—'):'—'}</td>
      <td style="font-size:11px;color:var(--text3);font-family:var(--mono)">${fd(t.updatedAt||t.createdAt)}</td>
      <td><div class="row-actions" onclick="event.stopPropagation()">
        ${!isA?`<button class="btn btn-ghost btn-sm" onclick="openTM('${t.id}')">Edit</button>`:''}
        ${!isA&&!t.sprintId?`<button class="btn btn-ghost btn-sm" onclick="addTicketToActiveSprint('${t.id}')" title="Add to active sprint">⚡ Sprint</button>`:''}
        ${!isA&&t.sprintId?`<button class="btn btn-ghost btn-sm" onclick="removeTicketFromSprint('${t.id}')" title="Remove from sprint">✕ Sprint</button>`:''}
        ${!isA?`<button class="btn btn-ghost btn-sm" onclick="archT('${t.id}')">Archive</button>`:
               `<button class="btn btn-ghost btn-sm" onclick="archT('${t.id}',true)">↩ Unarchive</button>`}
        <button class="btn btn-danger btn-sm" onclick="delT('${t.id}')">Del</button>
      </div></td>
    </tr>`).join('')}</tbody></table></div>`;
}

function renderSprints() {
  const activeSprint = sprints.find(s=>s.active&&!s.archived);
  setHead('Sprints', activeSprint?`Active: ${activeSprint.name}`:'No active sprint',
    `<div class="view-toggle">
      <button onclick="setSprintView('list')" class="${sprintView==='list'?'active':''}">≡ List</button>
      <button onclick="setSprintView('swimlane')" class="${sprintView==='swimlane'?'active':''}">⊞ Swimlane</button>
    </div>
    <button class="btn btn-primary" onclick="openSprintM()">+ New Sprint</button>`);

  const activeSprints = sprints.filter(s=>!s.archived);
  const archivedSprints = sprints.filter(s=>s.archived);

  document.getElementById('mc').innerHTML = tabsHtml(activeSprints.length, archivedSprints.length) +
    `<div id="tp-active">${sprintView==='swimlane' ? renderSprintsSwimlane(activeSprints) : renderSprintsList(activeSprints)}</div>
     <div id="tp-archived" style="display:none">${renderSprintsList(archivedSprints,true)}</div>`;
}
function setSprintView(v) {
  sprintView = v;
  localStorage.setItem('px_sprint_view', v);
  render();
}
function renderSprintsList(list, isArch=false) {
  if (!list.length) return `<div class="empty"><div class="ico">⚡</div><p>No sprints yet.</p></div>`;
  return list.map(s=>{
    const sTix = tix.filter(t=>t.sprintId===s.id&&!t.archived);
    const done = sTix.filter(t=>t.status==='production').length;
    const pct  = sTix.length ? Math.round(done/sTix.length*100) : 0;
    return `<div class="sprint-card">
      <div class="sprint-card-header">
        <div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="sprint-name">${s.name}</span>
            ${s.active?'<span class="tag tag-sprint" style="font-size:9px">ACTIVE</span>':''}
            ${isArch?'<span class="tag tag-archived" style="font-size:9px">ARCHIVED</span>':''}
          </div>
          <div class="sprint-meta" style="margin-top:4px">
            ${s.startDate?`<span>📅 ${s.startDate} → ${s.endDate||'?'}</span>`:''}
            <span>${sTix.length} tickets · ${pct}% done</span>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <div class="sprint-progress" style="flex:0 0 80px"><div class="sprint-progress-fill" style="width:${pct}%"></div></div>
          <div class="row-actions" style="opacity:1">
            ${!isArch&&!s.active?`<button class="btn btn-success btn-sm" onclick="activateSprint('${s.id}')">▶ Activate</button>`:''}
            ${s.active?`<button class="btn btn-primary btn-sm" onclick="openAddToSprintM('${s.id}')">+ Add Tickets</button>`:''}
            ${s.active?`<button class="btn btn-ghost btn-sm" onclick="completeSprint('${s.id}')">✓ Complete</button>`:''}
            <button class="btn btn-ghost btn-sm" onclick="openSprintM('${s.id}')">Edit</button>
            ${isArch?`<button class="btn btn-ghost btn-sm" onclick="archSprint('${s.id}',true)">↩ Unarchive</button>`:`<button class="btn btn-ghost btn-sm" onclick="archSprint('${s.id}')">Archive</button>`}
          </div>
        </div>
      </div>
      ${s.objective?`<div class="sprint-objective"><strong>Objective:</strong> ${s.objective}</div>`:''}
      ${tTable(sTix, 0)}
    </div>`;
  }).join('');
}
function renderSprintsSwimlane(list) {
  if (!list.length) return `<div class="empty"><div class="ico">⚡</div><p>No sprints yet. Create one first.</p></div>`;
  return list.map(s=>{
    const sTix = tix.filter(t=>t.sprintId===s.id&&!t.archived);
    const done = sTix.filter(t=>t.status==='production').length;
    const pct  = sTix.length ? Math.round(done/sTix.length*100) : 0;
    return `<div class="sprint-card">
      <div class="sprint-card-header">
        <div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="sprint-name">${s.name}</span>
            ${s.active?'<span class="tag tag-sprint" style="font-size:9px">ACTIVE</span>':''}
          </div>
          <div class="sprint-meta" style="margin-top:4px">
            ${s.startDate?`<span>📅 ${s.startDate} → ${s.endDate||'?'}</span>`:''}
            <span>${sTix.length} tickets · ${pct}% done</span>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <div class="sprint-progress" style="flex:0 0 100px"><div class="sprint-progress-fill" style="width:${pct}%"></div></div>
          ${!s.active?`<button class="btn btn-success btn-sm" onclick="activateSprint('${s.id}')">▶ Activate</button>`:''}
          ${s.active?`<button class="btn btn-primary btn-sm" onclick="openAddToSprintM('${s.id}')">+ Add Tickets</button>`:''}
          ${s.active?`<button class="btn btn-ghost btn-sm" onclick="completeSprint('${s.id}')">✓ Complete</button>`:''}
          <button class="btn btn-ghost btn-sm" onclick="openSprintM('${s.id}')">Edit</button>
        </div>
      </div>
      ${s.objective?`<div class="sprint-objective"><strong>Objective:</strong> ${s.objective}</div>`:''}
      <div class="swimlane-grid">
        ${ST.map(st=>{
          const colTix = sTix.filter(t=>t.status===st.v);
          return `<div class="swim-col">
            <div class="swim-col-title" style="color:${st.col}">${st.l} <span style="opacity:.6">(${colTix.length})</span></div>
            ${colTix.map(t=>`<div class="swim-card" onclick="openTD('${t.id}')">
              <div class="swim-card-title">${t.title}</div>
              <div class="swim-card-meta">
                ${t.ticketType&&t.ticketType!=='story'?tttag(t.ticketType):''}
                ${t.priority?ptag(t.priority):''}
                ${t.assignedTo?userAvatar(t.assignedTo):''}
              </div>
            </div>`).join('')}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}
function activateSprint(id) {
  sprints.forEach(s => { s.active = s.id===id; });
  save('sprints', sprints); render(); notify('Sprint activated ⚡');
}
function completeSprint(id) {
  if (!confirm('Mark sprint as complete and archive it?')) return;
  const s = sprints.find(x=>x.id===id);
  if (!s) return;
  s.active = false; s.archived = true; s.completedAt = new Date().toISOString();
  save('sprints', sprints); render(); notify('Sprint completed ✓');
}
function archSprint(id, unarch=false) {
  if (!unarch&&!confirm('Archive this sprint?')) return;
  const s=sprints.find(x=>x.id===id); if(!s)return;
  s.archived=!unarch; if(!unarch) s.active=false;
  save('sprints',sprints); render(); notify(unarch?'Unarchived':'Archived');
}

// ── Add tickets to a sprint via checkbox picker ───────────────────────────────
function openAddToSprintM(sprintId) {
  const s = sprints.find(x=>x.id===sprintId); if(!s) return;
  // Candidates: non-archived tickets NOT already in this sprint
  const candidates = tix.filter(t=>!t.archived && t.sprintId !== sprintId);
  const alreadyIn  = tix.filter(t=>!t.archived && t.sprintId === sprintId);

  const rows = candidates.map(t => {
    const crumb = t.epicId ? (epicBreadcrumb(t.epicId)||'') : '';
    return `<label class="sprint-picker-row">
      <input type="checkbox" class="sp-pick" value="${t.id}">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span class="id-chip">${t.id}</span>
          ${tttag(t.ticketType||'story')}
          ${stag(t.status)}
          ${t.priority?ptag(t.priority):''}
          <span style="font-weight:500">${t.title}</span>
        </div>
        ${crumb?`<div style="font-size:11px;color:var(--text3);margin-top:2px">${crumb}</div>`:''}
      </div>
      ${t.assignedTo?userAvatar(t.assignedTo):''}
    </label>`;
  }).join('');

  openM(`Add Tickets — ${s.name}`,
    `<div style="margin-bottom:10px;display:flex;align-items:center;justify-content:space-between">
       <span style="font-size:12px;color:var(--text2)">${alreadyIn.length} already in sprint · ${candidates.length} available</span>
       <div style="display:flex;gap:6px">
         <button class="btn btn-ghost btn-sm" onclick="spSelectAll(true)">Select All</button>
         <button class="btn btn-ghost btn-sm" onclick="spSelectAll(false)">Clear</button>
       </div>
     </div>
     ${candidates.length
       ? `<div class="sprint-picker">${rows}</div>`
       : `<div class="empty" style="padding:20px"><p>All tickets are already in this sprint or there are none to add.</p></div>`
     }`,
    `<button class="btn btn-ghost" onclick="closeM()">Cancel</button>
     <button class="btn btn-primary" onclick="confirmAddToSprint('${sprintId}')">Add Selected</button>`
  );
}

function spSelectAll(checked) {
  document.querySelectorAll('.sp-pick').forEach(cb => cb.checked = checked);
}

function confirmAddToSprint(sprintId) {
  const s = sprints.find(x=>x.id===sprintId); if(!s) return;
  const checked = [...document.querySelectorAll('.sp-pick:checked')].map(cb=>cb.value);
  if (!checked.length) { notify('Select at least one ticket','⚠'); return; }
  const now = new Date().toISOString();
  checked.forEach(id => {
    const i = tix.findIndex(t=>t.id===id); if(i<0) return;
    tix[i] = {...tix[i], sprintId, status: tix[i].status==='backlog'?'sprint':tix[i].status, updatedAt:now};
    addH(tix[i], 'Added to sprint', s.name);
  });
  save('tix', tix);
  closeM(); render();
  notify(`${checked.length} ticket${checked.length!==1?'s':''} added to ${s.name} ⚡`);
}

function addTicketToActiveSprint(ticketId) {
  const s = sprints.find(x=>x.active&&!x.archived);
  if (!s) { notify('No active sprint — activate one first','⚠'); return; }
  const i = tix.findIndex(t=>t.id===ticketId); if(i<0) return;
  const now = new Date().toISOString();
  tix[i] = {...tix[i], sprintId: s.id, status: tix[i].status==='backlog'?'sprint':tix[i].status, updatedAt:now};
  addH(tix[i], 'Added to sprint', s.name);
  save('tix', tix); render();
  notify(`Added to ${s.name} ⚡`);
}

function removeTicketFromSprint(ticketId) {
  const i = tix.findIndex(t=>t.id===ticketId); if(i<0) return;
  const spName = tix[i].sprintId ? (sprints.find(s=>s.id===tix[i].sprintId)?.name||'sprint') : 'sprint';
  const now = new Date().toISOString();
  tix[i] = {...tix[i], sprintId: null, status: tix[i].status==='sprint'?'backlog':tix[i].status, updatedAt:now};
  addH(tix[i], 'Removed from sprint', spName);
  save('tix', tix); render();
  notify('Removed from sprint');
}
function openSprintM(id=null) {
  const s = id ? sprints.find(x=>x.id===id) : null;
  const today = new Date().toISOString().split('T')[0];
  const twoWks = new Date(Date.now()+14*86400000).toISOString().split('T')[0];
  openM(s?'Edit Sprint':'New Sprint', `
    <div class="fg"><label class="fl">Sprint Name *</label><input class="fi" id="sp-name" value="${s?.name||''}" placeholder="Sprint 1 — Onboarding"></div>
    <div class="fg"><label class="fl">Objective</label><input class="fi" id="sp-obj" value="${s?.objective||''}" placeholder="What do we want to achieve?"></div>
    <div class="form-row">
      <div class="fg"><label class="fl">Start Date</label><input class="fi" id="sp-start" type="date" value="${s?.startDate||today}"></div>
      <div class="fg"><label class="fl">End Date</label><input class="fi" id="sp-end" type="date" value="${s?.endDate||twoWks}"></div>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeM()">Cancel</button><button class="btn btn-primary" onclick="saveSprint('${id||''}')">Save Sprint</button>`);
}
function saveSprint(id) {
  const name=document.getElementById('sp-name').value.trim();
  if(!name){notify('Name required','⚠');return;}
  const now=new Date().toISOString();
  if(id){
    const i=sprints.findIndex(s=>s.id===id);
    sprints[i]={...sprints[i],name,objective:document.getElementById('sp-obj').value.trim(),startDate:document.getElementById('sp-start').value||null,endDate:document.getElementById('sp-end').value||null,updatedAt:now};
    notify('Sprint updated');
  } else {
    sprints.push({id:nid('SPR'),name,objective:document.getElementById('sp-obj').value.trim(),startDate:document.getElementById('sp-start').value||null,endDate:document.getElementById('sp-end').value||null,active:false,archived:false,createdAt:now,history:[]});
    notify('Sprint created');
  }
  save('sprints',sprints); closeM(); render();
}

// RELEASES
// ══════════════════════════════════════════════════════════
function renderReleases() {
  setHead('Releases','Deploy-ready bundles of work',`<button class="btn btn-primary" onclick="openReleaseM()">+ New Release</button>`);
  const active=releases.filter(r=>!r.archived), arch=releases.filter(r=>r.archived);
  document.getElementById('mc').innerHTML = tabsHtml(active.length,arch.length) +
    `<div id="tp-active">${releaseList(active,false)}</div><div id="tp-archived" style="display:none">${releaseList(arch,true)}</div>`;
}
function releaseList(list, isArch) {
  if (!list.length) return `<div class="empty"><div class="ico">🚀</div><p>No releases yet.</p></div>`;
  return list.map(r=>{
    const rtix = tix.filter(t=>t.releaseId===r.id&&!t.archived);
    const byType = {};
    TTYPES.forEach(tt => byType[tt.v] = rtix.filter(t=>t.ticketType===tt.v||(!t.ticketType&&tt.v==='story')).length);
    return `<div class="release-card${r.deployed?' deployed':''}" onclick="openReleaseD('${r.id}')">
      <div class="release-card-header">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="type-badge tb-release">RELEASE</span>
          <span class="release-title">${r.name}</span>
          ${r.deployed?`<span class="tag tag-deployed">✓ Deployed</span>`:`<span class="tag tag-sprint">${rtix.length} tickets</span>`}
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          ${!r.deployed?`<button class="btn btn-success btn-sm" onclick="event.stopPropagation();deployRelease('${r.id}')">🚀 Deploy</button>`:''}
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();copyReleaseSummary('${r.id}')">📋 Copy Summary</button>
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openReleaseM('${r.id}')">Edit</button>
          ${isArch?`<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();archRelease('${r.id}',true)">↩ Unarchive</button>`:`<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();archRelease('${r.id}')">Archive</button>`}
        </div>
      </div>
      <div class="release-stats">
        ${r.targetDate?`<span>📅 Target: ${r.targetDate}</span>`:''}
        ${r.deployed&&r.deployedAt?`<span>✓ Deployed: ${fd(r.deployedAt)}</span>`:''}
        ${TTYPES.map(tt=>`<span>${tt.icon} ${byType[tt.v]} ${tt.l}${byType[tt.v]!==1?'s':''}</span>`).join('')}
      </div>
      ${r.description?`<div style="font-size:12px;color:var(--text2);margin-top:8px">${r.description}</div>`:''}
    </div>`;
  }).join('');
}
function deployRelease(id) {
  if(!confirm('Mark this release as deployed?'))return;
  const r=releases.find(x=>x.id===id); if(!r)return;
  r.deployed=true; r.deployedAt=new Date().toISOString();
  // Move all linked tickets to production
  let changed=0;
  tix.forEach(t=>{ if(t.releaseId===id&&t.status!=='production'){t.status='production';t.updatedAt=r.deployedAt;addH(t,'Status changed',`production (release ${r.name})`);changed++;} });
  if(changed) save('tix',tix);
  save('releases',releases); render(); notify(`Release deployed 🚀 (${changed} tickets → production)`);
}
function archRelease(id,unarch=false) {
  if(!unarch&&!confirm('Archive this release?'))return;
  const r=releases.find(x=>x.id===id); if(!r)return;
  r.archived=!unarch; save('releases',releases); render(); notify(unarch?'Unarchived':'Archived');
}
function buildReleaseSummary(r) {
  const rtix=tix.filter(t=>t.releaseId===r.id&&!t.archived);
  const lines=[
    `RELEASE: ${r.name}`,
    r.targetDate?`Target Date: ${r.targetDate}`:'',
    r.deployed&&r.deployedAt?`Deployed: ${fd(r.deployedAt)}`:'Status: Pending',
    r.description?`\nDescription:\n${r.description.replace(/<[^>]+>/g,'')}`:'' ,
    `\n── Tickets (${rtix.length}) ──────────────────────`,
    ...TTYPES.map(tt=>{
      const typed=rtix.filter(t=>t.ticketType===tt.v||(tt.v==='story'&&!t.ticketType));
      if(!typed.length)return'';
      return `\n${tt.icon} ${tt.l}s (${typed.length}):\n`+typed.map(t=>`  • [${t.id}] ${t.title} — ${ST.find(s=>s.v===t.status)?.l||t.status}`).join('\n');
    }),
    '\n── End of Release Summary ───────────────────',
  ];
  return lines.filter(l=>l!=='').join('\n');
}
function copyReleaseSummary(id) {
  const r=releases.find(x=>x.id===id); if(!r)return;
  const text=buildReleaseSummary(r);
  navigator.clipboard.writeText(text).then(()=>notify('Release summary copied 📋')).catch(()=>notify('Copy failed — see modal','⚠'));
  // Also show in modal
  openM(`Release Summary — ${r.name}`,`<div class="release-summary-box">${text}</div>`,
    `<button class="btn btn-ghost" onclick="closeM()">Close</button><button class="btn btn-primary" onclick="navigator.clipboard.writeText(document.querySelector('.release-summary-box').textContent).then(()=>notify('Copied!'))">📋 Copy</button>`);
}
function openReleaseD(id) {
  const r=releases.find(x=>x.id===id); if(!r)return;
  const rtix=tix.filter(t=>t.releaseId===r.id&&!t.archived);
  openD(`<div style="flex:1">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
      <span class="type-badge tb-release">RELEASE</span>
      <span class="id-chip">${r.id}</span>
      ${r.deployed?'<span class="tag tag-deployed">✓ Deployed</span>':''}
    </div>
    <div class="d-title">${r.name}</div>
    <div class="d-sub">Created ${fdf(r.createdAt)}</div>
  </div><button class="btn btn-ghost btn-icon" onclick="closeD()">✕</button>`,
  `<div class="irow"><span class="ilabel">Status</span>${r.deployed?'<span class="tag tag-deployed">Deployed</span>':'<span class="tag tag-sprint">Pending</span>'}</div>
   ${r.targetDate?`<div class="irow"><span class="ilabel">Target</span><span style="font-size:13px">${r.targetDate}</span></div>`:''}
   ${r.deployedAt?`<div class="irow"><span class="ilabel">Deployed</span><span style="font-size:13px">${fdf(r.deployedAt)}</span></div>`:''}
   <div class="irow"><span class="ilabel">Tickets</span><span class="tag tag-blue">${rtix.length}</span></div>
   ${rtix.length?`<div class="table-wrap" style="margin-top:10px;margin-bottom:0"><table><thead><tr><th>ID</th><th>Type</th><th>Title</th><th>Status</th></tr></thead><tbody>${rtix.map(t=>`<tr><td><span class="id-chip">${t.id}</span></td><td>${tttag(t.ticketType||'story')}</td><td style="font-size:13px">${t.title}</td><td>${stag(t.status)}</td></tr>`).join('')}</tbody></table></div>`:''}
   <div class="d-actions">
     <button class="btn btn-ghost btn-sm" onclick="closeD();openReleaseM('${r.id}')">✎ Edit</button>
     ${!r.deployed?`<button class="btn btn-success btn-sm" onclick="deployRelease('${r.id}');closeD()">🚀 Deploy</button>`:''}
     <button class="btn btn-ghost btn-sm" onclick="copyReleaseSummary('${r.id}')">📋 Copy Summary</button>
   </div>`);
}
function openReleaseM(id=null) {
  const r=id?releases.find(x=>x.id===id):null;
  openM(r?'Edit Release':'New Release',`
    <div class="fg"><label class="fl">Name *</label><input class="fi" id="rl-name" value="${r?.name||''}" placeholder="v1.2.0 — Auth Improvements"></div>
    <div class="fg"><label class="fl">Description</label>${rteHtml('desc',r?.description||'','Release notes…')}</div>
    <div class="fg"><label class="fl">Target Date</label><input class="fi" id="rl-date" type="date" value="${r?.targetDate||''}"></div>`,
    `<button class="btn btn-ghost" onclick="closeM()">Cancel</button><button class="btn btn-primary" onclick="saveRelease('${id||''}')">Save Release</button>`);
}
function saveRelease(id) {
  const name=document.getElementById('rl-name').value.trim();
  if(!name){notify('Name required','⚠');return;}
  const now=new Date().toISOString();
  if(id){
    const i=releases.findIndex(r=>r.id===id);
    releases[i]={...releases[i],name,description:rteGet('desc'),targetDate:document.getElementById('rl-date').value||null,updatedAt:now};
    notify('Release updated');
  } else {
    releases.push({id:nid('REL'),name,description:rteGet('desc'),targetDate:document.getElementById('rl-date').value||null,deployed:false,archived:false,createdAt:now,history:[]});
    notify('Release created');
  }
  save('releases',releases); closeM(); render();
}
